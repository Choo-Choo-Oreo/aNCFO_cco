y_conversion_factor_debug]> }"

  # ── GDPPC IDEAS ──────────────────────────────────────────────────────────────

  idea_GDPPC_Abject:0 "§RAbject Standards of Living§!"
  idea_GDPPC_Abject_desc:0 "§YLevel§! §R1§! §YDevelopment§! \n\n§YRelative Standing:§! §RBottom 12% of World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §Wno minimum§! \n\n§CRefreshes Every Quarter§! \n\n§RStarvation is not a crisis here. it is the baseline.§! The average citizen consumes fewer than 1,500 calories a day, and those calories are whatever the earth grudgingly yields. There are no hospitals, no schools worth the name, §Rno roads that outlast the rainy season§!. Infant mortality is so common it has stopped being a tragedy and become a statistic. The state, where it exists at all, §Ris a rumor in the capital§! and an irrelevance everywhere else. Life is purely biological — a daily negotiation between the body and its own extinction. \n\n§OThe foundations of a nation are here. but only just.§!"

  idea_GDPPC_Squalid:0 "§RSqualid Standards of Living§!"
  idea_GDPPC_Squalid_desc:0 "§YLevel§! §R2§! §YDevelopment§! \n\n§YRelative Standing:§! §RBelow 22% of World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$15 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§RThe village is the entire world.§! Mud-floor hovels, open sewers running between homes, and a communal well that is also a communal illness. Most of the population has §Rnever seen a map§! of the country they nominally inhabit, never handled paper currency, never spoken to anyone from the government except a tax collector or a soldier. §RLiteracy is a luxury§! reserved for the priest and the landlord. Children work as soon as they can carry something. The concept of a career does not exist — only the season's labor, and the debt that outlasts it. \n\n§OModernization is possible. but the road is long.§!"

  idea_GDPPC_Hardscrabble:0 "§OHardscrabble Standards of Living§!"
  idea_GDPPC_Hardscrabble_desc:0 "§YLevel§! §O3§! §YDevelopment§! \n\n§YRelative Standing:§! §OBelow 35% of World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$35 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§OSubsistence farming is the national industry, the national pastime, and the national destiny.§! A good harvest means the family eats. A bad one means the family borrows — and §Odebt, once acquired§!, is not a temporary inconvenience but a permanent condition passed between generations like a family name. There are markets in the towns, and occasionally a telegraph office, and a schoolhouse that operates a few months a year §Owhen the children aren't needed in the fields§!. Progress exists, technically. It is just very, very slow. \n\n§YThe building blocks are in place. What matters now is momentum.§!"

  idea_GDPPC_Grimy:0 "§OGrimy Standards of Living§!"
  idea_GDPPC_Grimy_desc:0 "§YLevel§! §O4§! §YDevelopment§! \n\n§YRelative Standing:§! §OBelow 52% of World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$80 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§OThe industrial revolution has arrived, but it has not brought liberation. it has brought the factory.§! Twelve-hour shifts, six days a week, in buildings where §Othe air tastes of coal§! and the floor vibrates constantly. Workers live in tenements stacked so close together that sunlight is a seasonal visitor. §YLife expectancy§! peaks somewhere in the mid-forties if you avoid the lungs that the dust inevitably claims. Children who don't work in fields now work in mills. §OThe city is growing. It is not yet a place anyone would choose to live.§! \n\n§YA nation on the cusp of transformation.§!"

  idea_GDPPC_Meager:0 "§OMeager Standards of Living§!"
  idea_GDPPC_Meager_desc:0 "§YLevel§! §O5§! §YDevelopment§! \n\n§YRelative Standing:§! §YBelow 75% of World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$150 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§YBasic needs are technically met.§! There is bread most days, shoes that mostly fit, a roof that mostly doesn't leak. But life is §Ogrey and fragile§! — one illness, one failed crop, one lost job separates the family from genuine destitution. The state provides almost nothing. §OEducation exists but is not universal. Medicine exists but is not affordable.§! The working class labors long hours for wages that cover necessities and nothing beyond. There is no savings. There is no safety net. There is only tomorrow's shift and the hope that nothing goes wrong. \n\n§YA respectable position. with room to grow.§!"

  idea_GDPPC_Decent:0 "§LDecent Standards of Living§!"
  idea_GDPPC_Decent_desc:0 "§YLevel§! §L6§! §YDevelopment§! \n\n§YRelative Standing:§! §LAt 75% of World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$300 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§LThe global baseline of a functioning society.§! A radio in the parlor, a Sunday suit kept for weddings and funerals, and children who can reasonably expect to finish primary school. Work is hard but not inhuman — enough hours to live on, with enough left over at week's end for a meal that isn't pure starch. §GThe newspapers reach the town by train. The doctor is expensive but exists.§! The future feels neither guaranteed nor impossible. Most of humanity lives here, and most of humanity has lived worse. \n\n§GA serious player, capable of sustained effort in modern warfare.§!"

  idea_GDPPC_Comfortable:0 "§LComfortable Standards of Living§!"
  idea_GDPPC_Comfortable_desc:0 "§YLevel§! §L7§! §YDevelopment§! \n\n§YRelative Standing:§! §LAbove 105% of World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$500 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§LIndoor plumbing has become universal rather than aspirational.§! The middle class is not just a category — it is a culture, a constituency, and §Ga growing political force§! with opinions about tariffs and municipal parks. Workers have weekends, and they have begun to develop the distinctly modern habit of §Gspending money on things they don't strictly need§!. Secondary education is becoming the norm rather than the exception. §LThe future feels, for the first time in history for most people, genuinely open.§! \n\n§GOne of the world's advanced economies. A force to be reckoned with.§!"

  idea_GDPPC_Robust:0 "§GRobust Standards of Living§!"
  idea_GDPPC_Robust_desc:0 "§YLevel§! §G8§! §YDevelopment§! \n\n§YRelative Standing:§! §GAbove 1.40× World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$800 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§GHigh-protein diets, modern medicine, and regulated working hours have remade the human body and the human expectation.§! Workers are healthier, taller, and better educated than any previous generation. They also §Gknow their rights§! and are increasingly willing to assert them. Refrigerators are in most kitchens. Automobiles are within reach of the ambitious. Organized labor has won enough concessions that §Gthe workplace is no longer a place of casual brutality§!. Life is not easy, but it is recognizably modern. \n\n§GAmong the wealthiest economies on the globe. Few can match this level of development.§!"

  idea_GDPPC_Vibrant:0 "§GVibrant Standards of Living§!"
  idea_GDPPC_Vibrant_desc:0 "§YLevel§! §G9§! §YDevelopment§! \n\n§YRelative Standing:§! §GAbove 1.85× World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$1,200 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§GConsumer culture has ignited.§! Refrigerators, washing machines, radios, and household appliances are transforming the domestic landscape. §GAdvertising is a profession. Fashion changes seasonally.§! The city at night is lit and alive, and the population participates in it rather than merely surviving within it. Higher education is becoming accessible to the working class, not just the elite. §GThe economy is driven as much by what citizens buy as by what they produce.§! \n\n§GExceptional prosperity. This is the upper echelon. Very few economies reach this stage.§!"

  idea_GDPPC_Prosperous:0 "§GProsperous Standards of Living§!"
  idea_GDPPC_Prosperous_desc:0 "§YLevel§! §G10§! §YDevelopment§! \n\n§YRelative Standing:§! §GAbove 2.50× World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$1,800 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§GPrivate automobiles are a right, not a luxury. they are simply what adults own.§! Suburbia sprawls outward from every city. Supermarkets replace corner shops. Highways replace cart roads. §GThe state provides education, healthcare, and infrastructure as baseline expectations§! rather than political promises. The average citizen has savings, insurance, a pension on the distant horizon, and enough disposable income to have developed genuine hobbies. The material concerns that defined all prior human history are, for most people, §Glargely solved§!. \n\n§YRarity:§! §CRemarkable prosperity. Requires sustained economic expansion.§!"

  idea_GDPPC_Opulent:0 "§GOpulent Standards of Living§!"
  idea_GDPPC_Opulent_desc:0 "§YLevel§! §G11§! §YDevelopment§! \n\n§YRelative Standing:§! §GAbove 3.40× World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$2,500 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§GDomestic automation has begun its quiet revolution.§! Machines wash clothes, dishes, and floors. Manual labor is being phased out of the home and slowly — controversially — out of the factory. §GThe professional class has expanded§! so dramatically that white-collar workers now outnumber blue-collar ones in some sectors. Foreign travel is becoming a middle-class expectation. Universities are full. The arts are publicly funded. §GLeisure has become an industry in its own right, and citizens are good at it.§! \n\n§YRarity:§! §CVery Rare. Represents the practical upper limit of economic achievement.§!"

  idea_GDPPC_Gilded:0 "§CGilded Standards of Living§!"
  idea_GDPPC_Gilded_desc:0 "§YLevel§! §C12§! §YDevelopment§! \n\n§YRelative Standing:§! §CAbove 4.50× World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$3,600 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§CHigh-speed transit connects every city. Electrification is total and reliable.§! The smog and soot of the early industrial age are memories preserved in old photographs. Air travel is commercial and growing. §CThe average home is fully wired and stocked with machinery§! that would have seemed miraculous to the previous generation. The population is long-lived, well-fed, and highly educated. §CThe question is no longer whether citizens can survive. it is what kind of civilization they want to build with their abundance.§! \n\n§YRarity:§! §CExtremely Rare. Far beyond the global standard.§!"

  idea_GDPPC_Radiant:0 "§CRadiant Standards of Living§!"
  idea_GDPPC_Radiant_desc:0 "§YLevel§! §C13§! §YDevelopment§! \n\n§YRelative Standing:§! §CAbove 6.00× World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$5,000 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§CUniversal higher education has produced a population where expertise is the norm rather than the exception.§! The nation's cultural output — its films, music, literature, and design — has become §Ca defining force in global taste and aspiration§!. Scientific research is generously funded and aggressively pursued. The working week continues to shrink as automation absorbs more of the labor burden. §CCitizens debate philosophy, urban planning, and the ethics of technology§! in the same breath as they discuss sport scores. This is a civilization operating near the peak of what modern thought believes possible. \n\n§YRarity:§! §WNear-Impossible. Requires extraordinary circumstances.§!"

  idea_GDPPC_Transcendental:0 "§CTranscendental Standards of Living§!"
  idea_GDPPC_Transcendental_desc:0 "§YLevel§! §C14§! §YDevelopment§! \n\n§YRelative Standing:§! §CAbove 7.50× World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$6,500 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§CPost-scarcity in food and energy has arrived.§! The agricultural and energy sectors run on automation so complete that only a fraction of the workforce touches them. Cities are clean, luminous, rationally planned, and §Cserviced by transit systems that run to the minute§!. Medicine has pushed life expectancy to extraordinary lengths. §CThe state has essentially solved poverty as a material condition.§! Citizens now debate problems of meaning, identity, and purpose that previous generations would have considered indulgent luxuries. \n\n§YRarity:§! §WAlmost Impossible.§!"

  idea_GDPPC_Utopian:0 "§WUtopian Standards of Living§!"
  idea_GDPPC_Utopian_desc:0 "§WHighest Development Level§! \n§YRelative Standing:§! §WAbove 9.00× World Average§! §7(World Avg: [?global.average_GDP_per_capita|0])§! \n§YFloor Required:§! §W$8,200 GDPPC§! \n\n§CRefreshes Every Quarter§! \n\n§WABSOLUTE PROSPERITY§!\n\n§CThe singularity of living standards. This number sits beyond the horizon of what any known economy has achieved. it is the terminal point of a progression that reality has not yet reached.§! §WPerfect health§! maintained by medicine that borders on the miraculous. §WInfinite leisure§! enabled by total automation. A population that has so thoroughly forgotten what material want feels like that the word §Wpoverty§! has become a historical curiosity, studied alongside plague and serfdom. Whether this is paradise or something more complicated is a question the philosophers are still working on. \n\n§WThis is the ceiling. There is nothing above this.§!\n§RHighest Development Level Reached§!"

  # ── GDP SIZE IDEAS ────────────────────────────────────────────────────────────

  idea_GDP_Primitive:0 "§RPrimitive Economy§!"
  idea_GDP_Primitive_desc:0 "§YLevel§! §R1§! §YEconomy Size§! \n\n§YRelative Standing:§! §RBelow 0.03% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §Wno minimum§! \n\n§CRefreshes Every Month§! \n\n§RThere is no formal economy here in any meaningful sense.§! Currency, where it circulates, does so erratically and is trusted by almost no one. Exchange is conducted in grain, livestock, and favors. §RThe state budget could be managed by a careful household accountant.§! There is no banking sector, no industrial output worth measuring, no trade policy — because there is nothing to trade and nowhere to trade it. Foreign economists, when they account for this nation at all, §Rdo so in footnotes§!. On the global ledger, this economy is a rounding error, and not a significant one. \n\n§OA nation in name. but economically, almost invisible.§!"

  idea_GDP_Negligible:0 "§RNegligible Economy§!"
  idea_GDP_Negligible_desc:0 "§YLevel§! §R2§! §YEconomy Size§! \n\n§YRelative Standing:§! §RAbove 0.03% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$0.05B§! \n\n§CRefreshes Every Month§! \n\n§RA statistical footnote in the world economy.§! The entire national output can be disrupted by §Ra single bad harvest§!, a collapsed mine, or a foreign company deciding to relocate. There is perhaps one major export — a crop, a mineral, a strategically located port — and the §Rentire fiscal architecture of the state depends on it§!. One bad year in the commodity markets means the government cannot pay its officials. Foreign loans are a permanent fixture of the budget. The economy exists, technically, but it exists on borrowed time and borrowed money. \n\n§OSmall, but not without potential.§!"

  idea_GDP_Peripheral:0 "§OPeripheral Economy§!"
  idea_GDP_Peripheral_desc:0 "§YLevel§! §O3§! §YEconomy Size§! \n\n§YRelative Standing:§! §OAbove 0.08% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$0.15B§! \n\n§CRefreshes Every Month§! \n\n§OThis nation exists on the margins of the global economy. present enough to appear on trade ledgers, not significant enough to influence them.§! Raw materials flow outward; manufactured goods flow inward. §OThe terms of this exchange are set entirely by others.§! There is a small professional class, a small merchant class, and a very large class of people who grow things or dig things for wages determined by foreign buyers. Industry is nascent and dependent on imported capital and expertise. §OThe economy is not growing so much as it is being grown. by outside forces, for outside benefit.§! \n\n§YSmall, but making its presence felt.§!"

  idea_GDP_Rudimentary:0 "§ORudimentary Economy§!"
  idea_GDP_Rudimentary_desc:0 "§YLevel§! §O4§! §YEconomy Size§! \n\n§YRelative Standing:§! §OAbove 0.20% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$0.40B§! \n\n§CRefreshes Every Month§! \n\n§OThe first genuine stirrings of an organized economy.§! A railway line connects the capital to the port. A factory district produces something the country used to import. §YA central bank has been established§!, though its reserves are thin and its credibility is newer than its building. The budget is small but intentional — roads are being built, a customs service exists, the telegraph reaches most major towns. §OIt is fragile and dependent, but it is an economy with a direction§!, which is more than can be said for many. \n\n§YA nation finding its economic voice.§!"

  idea_GDP_Developing:0 "§ODeveloping Economy§!"
  idea_GDP_Developing_desc:0 "§YLevel§! §O5§! §YEconomy Size§! \n\n§YRelative Standing:§! §YAbove 0.50% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$0.90B§! \n\n§CRefreshes Every Month§! \n\n§YGrowing, but fragile§! in the way that adolescent things are fragile — full of momentum and very vulnerable to a single misstep. There are real industries here, real exports beyond raw commodities, §Ya manufacturing sector§! that employs a meaningful fraction of the workforce. But the economy rests on a narrow base and §Oany external shock reverberates through the entire system§!. Foreign capital is welcome and necessary. The business cycle, when it turns downward, turns hard. \n\n§YSolid ground. enough to fight a real war, if needed.§!"

  idea_GDP_Moderate:0 "§LModerate Economy§!"
  idea_GDP_Moderate_desc:0 "§YLevel§! §L6§! §YEconomy Size§! \n\n§YRelative Standing:§! §LAbove 1.00% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$2B§! \n\n§CRefreshes Every Month§! \n\n§LA functioning, self-sustaining economy that neither dazzles nor embarrasses.§! Tax revenues cover government expenditures in most years. §GIndustry is diversified§! enough that no single failure is catastrophic. A banking sector exists and is trusted by most citizens most of the time. Trade flows in both directions with a reasonable balance. §LNot powerful enough to project force beyond its borders, not weak enough to be at anyone's mercy.§! Stable, unglamorous, and quietly functional. \n\n§GA credible power. both at home and abroad.§!"

  idea_GDP_Established:0 "§LEstablished Economy§!"
  idea_GDP_Established_desc:0 "§YLevel§! §L7§! §YEconomy Size§! \n\n§YRelative Standing:§! §LAbove 2.00% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$5B§! \n\n§CRefreshes Every Month§! \n\n§LDiversified industry, a real financial sector with international connections, and enough aggregate output to matter regionally.§! This economy can §Gfinance a modern military§! without resorting to emergency borrowing. It has institutions that produce engineers, factories that produce machines, and banks that produce capital. §GOther nations in the region notice its trade policy.§! Its currency is accepted abroad without suspicion. It is not a great power, but it is a power, and it knows it. \n\n§GA force in global economics. too large to ignore.§!"

  idea_GDP_Substantial:0 "§GSubstantial Economy§!"
  idea_GDP_Substantial_desc:0 "§YLevel§! §G8§! §YEconomy Size§! \n\n§YRelative Standing:§! §GAbove 3.50% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$12B§! \n\n§CRefreshes Every Month§! \n\n§GA recognizable economic force on the continental scale.§! Industrial output is large enough to sustain a §Gserious military-industrial complex§! without gutting the civilian economy. The financial sector has international reach — loans are made abroad, investments placed in foreign ventures, the currency held as a reserve by smaller neighbors. §GResource shortfalls hurt but do not cripple.§! This is the economy of a nation that has arrived — not at the top table, but in the room. \n\n§GA pillar of the global order.§!"

  idea_GDP_Considerable:0 "§GConsiderable Economy§!"
  idea_GDP_Considerable_desc:0 "§YLevel§! §G9§! §YEconomy Size§! \n\n§YRelative Standing:§! §GAbove 6.00% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$25B§! \n\n§CRefreshes Every Month§! \n\n§GIndustrial output at this scale commands genuine respect on the world stage.§! Trade policy decisions made here ripple outward to smaller economies. The manufacturing sector is deep and diversified — §Gsteel, chemicals, machinery§!, and emerging industries all exist in meaningful volumes. The military-industrial complex can §Gsustain prolonged modern warfare§! without catastrophic civilian sacrifice. Foreign nations study this economy's industrial output figures with genuine attention. §GThis is a nation other nations worry about.§! \n\n§GThe economy of a true great power.§!"

  idea_GDP_Powerful:0 "§GPowerful Economy§!"
  idea_GDP_Powerful_desc:0 "§YLevel§! §G10§! §YEconomy Size§! \n\n§YRelative Standing:§! §GAbove 9.00% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$50B§! \n\n§CRefreshes Every Month§! \n\n§GA genuine economic powerhouse.§! The currency is a major factor in regional and increasingly global trade. Factories operate around the clock. §GThe financial sector exports capital§! to developing economies and collects returns. Resource dependencies exist but are managed through §Gstrategic stockpiles, substitute industries§!, and an import network that reaches every corner of the globe. §GAn economy at this scale does not just participate in the international order. it helps write its rules.§! \n\n§GSuperpower status. economic dominance made manifest.§!"

  idea_GDP_Major:0 "§GMajor Economy§!"
  idea_GDP_Major_desc:0 "§YLevel§! §G11§! §YEconomy Size§! \n\n§YRelative Standing:§! §GAbove 13.0% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$90B§! \n\n§CRefreshes Every Month§! \n\n§GAmong the handful of truly consequential economies on earth.§! Industrial decisions made here — what to produce, what to buy, what to embargo — are felt in the §Gbalance sheets of nations on the other side of the world§!. The manufacturing base is so deep that §Glosing an entire industry to enemy action barely registers§! before substitutes are found. This economy can sustain total war, absorb catastrophic losses, reconstitute, and continue. §GIt has the institutional memory and industrial depth to outlast almost anything.§! \n\n§YRarity:§! §CExceptional. Requires a dominant continental position.§!"

  idea_GDP_Dominant:0 "§CDominant Economy§!"
  idea_GDP_Dominant_desc:0 "§YLevel§! §C12§! §YEconomy Size§! \n\n§YRelative Standing:§! §CAbove 18.0% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$140B§! \n\n§CRefreshes Every Month§! \n\n§CContinental-scale economic gravity.§! Smaller economies don't just trade with this nation — they §Corbit it§!, structuring their own production around its demand and their own currencies around its stability. The industrial base is so diversified that §Cresource shortages are logistical inconveniences§! rather than strategic vulnerabilities. Capital flows outward in enormous volumes. The military-industrial output, even in peacetime, §Cexceeds what most nations could achieve at full mobilization§!. \n\n§YRarity:§! §CVery Rare. Continental economic dominance.§!"

  idea_GDP_Paramount:0 "§CParamount Economy§!"
  idea_GDP_Paramount_desc:0 "§YLevel§! §C13§! §YEconomy Size§! \n\n§YRelative Standing:§! §CAbove 24.0% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$220B§! \n\n§CRefreshes Every Month§! \n\n§CA global economic force with no regional peer and few global ones.§! Output at this scale §Cexceeds the combined production of most continental coalitions§!. The industrial apparatus generates its own gravity — raw materials flow in from every corner of the earth, finished goods flow out to every market. §CIn wartime, production curves that would take other nations years to achieve can be reached in months.§! This is not just an economy. It is a force of nature wearing a flag. \n\n§YRarity:§! §WNear-Impossible. Global economic supremacy.§!"

  idea_GDP_Titan:0 "§CTitan Economy§!"
  idea_GDP_Titan_desc:0 "§YLevel§! §C14§! §YEconomy Size§! \n\n§YRelative Standing:§! §CAbove 35.0% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$400B§! \n\n§CRefreshes Every Month§! \n\n§CThe theoretical upper bound of what a nation-state could conceivably achieve under extraordinary circumstances.§! The industrial output is so immense that the limiting factor is no longer capital, labor, or resources — §Cit is the sheer organizational challenge of coordinating something this large§!. Every sector of the global economy is downstream of decisions made here. §CAllies are grateful. Enemies are calculating whether the math can possibly work in their favor.§! It usually cannot. \n\n§YRarity:§! §WAlmost Impossible.§!"

  idea_GDP_Hegemon:0 "§WHegemon Economy§!"
  idea_GDP_Hegemon_desc:0 "§WHighest Economy Size§! \n§YRelative Standing:§! §WAbove 50.0% of World Economy§! §7(Your Share: [?percentage_of_GDP|0..2]%)§! \n§YFloor Required:§! §W$700B§! \n\n§CRefreshes Every Month§! \n\n§WABSOLUTE ECONOMIC SUPREMACY§!\n\n§CThis number does not exist in any known era of human economic history. It is the industrial equivalent of Utopia. the terminal point of a progression that reality has not yet reached.§! An economy of this scale would not merely dominate the global order; §Wit would constitute it§!. Every trade route, every commodity price, every currency exchange rate would be a downstream consequence of decisions made within its borders. Other nations would not have foreign policies so much as §Wresponses§! to its foreign policy. The slide rule runs out of space. The ledger has no more columns. \n\n§WThis is the ceiling. There is nothing above this.§!\n§RHighest Economy Size Reached§!"

  # ── MAP MODE LOCALISATION ─────────────────────────────────────────────────────

  # State GDP Map Mode
  MAPMODE_ECO_STATE_GDP_MAP_MODE:0 "§YState GDP§!"
  MAPMODE_ECO_STATE_GDP_MAP_MODE_NAME:0 "State GDP"
  MAPMODE_ECO_STATE_GDP_MAP_MODE_DESCRIPTION:0 "Displays the §YGross Domestic Product§! of each state individually, reflecting its industrial output, resource wealth, and agricultural contribution. Darker §4blue§! states are economic powerhouses. §Oamber§! and §Rred§! states are economically marginal. §CRefreshes Every Quarter§!"

  ECO_state_GDP_map_mode_tooltip:0 "§Y[FROM.GetName]§!\n§WState GDP:§! §G[?FROM.state_GDP|3] B§!\n§WState GDP per Capita:§! §G[?FROM.state_GDP_per_capita|0]§!"
  ECO_state_GDP_map_mode_tooltip_delayed:0 "§Y[FROM.GetName]§!\n§WState GDP:§! §G[?FROM.state_GDP|3] B§!\n§WState GDP per Capita:§! §G[?FROM.state_GDP_per_capita|0]§!\n\n§CShows the productive output of this state, accounting for factory location quality, resources, and agriculture. §YUpdates quarterly.§!"

  # State GDP Per Capita Map Mode
  MAPMODE_ECO_STATE_GDP_PER_CAPITA_MAP_MODE:0 "§YState GDP p.C.§!"
  MAPMODE_ECO_STATE_GDP_PER_CAPITA_MAP_MODE_NAME:0 "State GDP Per Capita"
  MAPMODE_ECO_STATE_GDP_PER_CAPITA_MAP_MODE_DESCRIPTION:0 "Displays the §YGDP Per Capita§! of each state, showing the average economic output per person. A proxy for local §Yliving standards§! and workforce quality within a country's borders. §4Blue§! states have prosperous, productive populations. §Rred§! states are impoverished. §CRefreshes Every Quarter§!"

  ECO_state_GDP_per_capita_map_mode_tooltip:0 "§Y[FROM.GetName]§!\n§WState GDP per Capita:§! §G[?FROM.state_GDP_per_capita|0]§!\n§WState GDP:§! §G[?FROM.state_GDP|3] B§!"
  ECO_state_GDP_per_capita_map_mode_tooltip_delayed:0 "§Y[FROM.GetName]§!\n§WState GDP per Capita:§! §G[?FROM.state_GDP_per_capita|0]§!\n§WState GDP:§! §G[?FROM.state_GDP|3] B§!\n\n[FROM.state_gdppc_condition]\n\n§7Updates quarterly.§!"
  # ── STATE GDPPC MAP MODE — 75-combination flavour text ───────────────────────
  # ── UTOPIAN (Level 15) ─────────────────────────────────────────────────
  state_gdppc_utopian_metro:0 "§WUtopian Industrial Heartland. Level 15§!\n§WThis region should not exist.§! Glass towers, automated transit, workers who measure their salary in gold rather than subsistence. The skyline looks like a fever dream of the future. §WBanks, exchanges, and empires are headquartered here.§! Every other region in the world, consciously or not, is trying to become this one. §CThe absolute ceiling of what human civilization has managed to concentrate in one place.§!"
  state_gdppc_utopian_urban:0 "§WUtopian Urbanised Region. Level 15§!\n§WThe factories here produce things other nations haven't invented yet.§! Workers earn wages that would make even a financier raise an eyebrow. §WEngineers, chemists, and master craftsmen§! fill every shift. The unions negotiate from a position of pure strength. §CHistory will remember the goods that came out of this region.§!"
  state_gdppc_utopian_agrarian:0 "§WUtopian Urbanising Region. Level 15§!\n§WA region that completed its transformation before the rest of the world began theirs.§! What was once farmland is now productive industry, and the transition has been §Wso thoroughly managed§! that neither the workers nor the land were sacrificed in the process. §CFarm income and industrial wages here are indistinguishable. This region is a case study in doing it right.§!"
  state_gdppc_utopian_rural:0 "§WUtopian Rural Heartland. Level 15§!\n§WFarm income here rivals the salary of any professional.§! The fields are fully mechanized, the cooperatives powerful, the roads immaculate. §WEvery household has running water and a radio.§! The concept of a bad harvest has been engineered out of existence. §CA countryside that the rest of the world calls impossible.§!"
  state_gdppc_utopian_wasteland:0 "§WUtopian Resource Enclave. Level 15§!\n§WThe extraction here generates wealth so concentrated§! that even the roughnecks and mine foremen live like minor aristocracy. §WWorker settlements with genuine luxury§! — swimming pools, libraries, theatres. §CA place where the earth itself decided to be generous, and the people had the wit to capture it.§!"
  # ── TRANSCENDENTAL (Level 14) ─────────────────────────────────────────────────
  state_gdppc_transcendental_metro:0 "§WTranscendental Industrial Heartland. Level 14§!\n§WOne of the great productive regions of the world.§! The financial and industrial districts alone move more wealth in a week than most nations produce in a year. §WThe middle class is enormous, well-fed, and politically confident.§! Destitution exists only in the statistical margins. §CThis is the region that defines what prosperity can be.§!"
  state_gdppc_transcendental_urban:0 "§CTranscendental Urbanised Region. Level 14§!\n§CThe factory floors here are the most productive on earth§!, running on precision engineering and skilled labour that took a generation to build. §CWages are high, turnover is low§!, and the workers own their own homes. §WA region that has genuinely arrived. and knows it.§!"
  state_gdppc_transcendental_agrarian:0 "§CTranscendental Urbanising Region. Level 14§!\n§CA region mid-transformation, and doing it extraordinarily well.§! Industry is displacing agriculture at pace, but §Cthe workers transitioning between them lose nothing in the move§!. Both sectors are productive, organized, and well-compensated. §WThe envy of every transitioning region on earth.§!"
  state_gdppc_transcendental_rural:0 "§CTranscendental Rural Region. Level 14§!\n§CFarm income here is indistinguishable from professional wages.§! The equipment is modern, the markets are organized, and §Cthe surplus feeds half the continent§!. Agricultural science is practiced, not just tradition. §WThe countryside at its absolute best.§!"
  state_gdppc_transcendental_wasteland:0 "§CTranscendental Resource Enclave. Level 14§!\n§CThe richest veins, the most efficient extraction, and a workforce compensated at rates that would embarrass most industrial managers.§! §CWorker settlements with real amenities§! — schools, hospitals, electricity. The land here pays handsomely, and it shows.§!"
  # ── RADIANT (Level 13) ─────────────────────────────────────────────────
  state_gdppc_radiant_metro:0 "§CRadiant Industrial Heartland. Level 13§!\n§CA world-class productive region in every sense.§! Commerce is diverse, the professionals are educated, and §Cthe infrastructure functions without apology§!. Not the richest region on earth, but in honest contention. §GThe kind of place people move to, not away from.§!"
  state_gdppc_radiant_urban:0 "§CRadiant Urbanised Region. Level 13§!\n§CHigh wages, functioning unions, and factory floors that run on expertise rather than desperation.§! §CWorkers retire with savings§!. Healthcare reaches everyone. §GThis region has figured out how to make industry work for the people in it, not just the owners.§!"
  state_gdppc_radiant_agrarian:0 "§CRadiant Urbanising Region. Level 13§!\n§CA region actively and successfully industrialising.§! The agricultural base remains productive while §Cnew industries take root alongside it§!. Workers move between sectors with relative ease. §GThe transition is real, organized, and generating genuine prosperity for both the fields and the factory floors.§!"
  state_gdppc_radiant_rural:0 "§CRadiant Rural Region. Level 13§!\n§CFertile land under capable management§!, with road access, organized markets, and genuine surplus. §CFarm families here own their land§!, educate their children, and eat well year-round. §GThe countryside at its civilized best.§!"
  state_gdppc_radiant_wasteland:0 "§CRadiant Resource Region. Level 13§!\n§CExtraction organized, productive, and well-compensated.§! The workforce is small but skilled, the operation efficient. §CWorker housing is maintained§!, wages are honest. §GA remote region that is genuinely worth living in.§!"
  # ── GILDED (Level 12) ─────────────────────────────────────────────────
  state_gdppc_gilded_metro:0 "§GGilded Industrial Heartland. Level 12§!\n§GA prosperous and confident region.§! Commerce districts are stocked, cultural venues are full, and the §Gmiddle class has genuine spending power§!. The poor exist but do not define the region. §GInstitutions work§!. This is what other regions aspire to become.§!"
  state_gdppc_gilded_urban:0 "§GGilded Urbanised Region. Level 12§!\n§GThe factory workers here earn enough to own furniture, pay rent, and occasionally afford a luxury.§! §GUnion membership is strong§!, working conditions negotiated. §GSkilled trades are well-compensated.§! A region where industrial work leads to a life worth living.§!"
  state_gdppc_gilded_agrarian:0 "§GGilded Urbanising Region. Level 12§!\n§GIndustrialisation here is well underway and broadly beneficial.§! §GThe new factory floors pay decent wages§!, the remaining farms are organized and surplus-generating. The workforce is transitioning with purpose, not desperation. §GThis region is building something. and it shows.§!"
  state_gdppc_gilded_rural:0 "§GGilded Rural Region. Level 12§!\n§GWell-organized farming with genuine market surplus and cooperative strength.§! §GFarm families here are not wealthy but they are comfortable§! — debt is manageable, the harvest is predictable, and the children go to school. §GThe countryside that works.§!"
  state_gdppc_gilded_wasteland:0 "§GGilded Resource Region. Level 12§!\n§GConsistent extraction at genuine scale, workers paid fairly by any standard.§! §GThe operation is organized, the equipment functional§!, the output reliable. Not glamorous — §Gbut the kind of region that pays its people and maintains itself.§!"
  # ── OPULENT (Level 11) ─────────────────────────────────────────────────
  state_gdppc_opulent_metro:0 "§GOpulent Major Industrial Centre. Level 11§!\n§GA large and functioning region with real prosperity distributed across its districts.§! Wealthy areas are genuinely wealthy, §Gthe working class earns enough§!. Commerce moves, institutions function, and §Gthe region produces more than it consumes§!. Room to improve, but nothing to be ashamed of.§!"
  state_gdppc_opulent_urban:0 "§GOpulent Urbanised Region. Level 11§!\n§GFactory wages here cover necessities and then some.§! The §Gworkers are organized§!, management knows not to push too hard. §GSome discretionary income§! filters through the local economy. A region with its industrial footing firmly planted.§!"
  state_gdppc_opulent_agrarian:0 "§GOpulent Urbanising Region. Level 11§!\n§GThe balance between old and new here is working in everyone's favour.§! Agriculture feeds the region comfortably while §Gemerging industry adds wages and variety§! to the economy. Workers have options. §GNeither sector is exploited to subsidize the other.§!"
  state_gdppc_opulent_rural:0 "§GOpulent Rural Region. Level 11§!\n§GEnough surplus to sell, enough savings to survive a bad year.§! §GRoads connect the farms to the markets§!, and the markets offer fair prices most of the time. The children are educated. §GThis is prosperous rural life, without pretension.§!"
  state_gdppc_opulent_wasteland:0 "§GOpulent Resource Region. Level 11§!\n§GThe extraction here works. Workers receive wages worth receiving§!, housing is adequate, and the operation shows no signs of stopping. §GNot the richest find. but a real one, properly managed§! by people who know what they're doing.§!"
  # ── PROSPEROUS (Level 10) ─────────────────────────────────────────────────
  state_gdppc_prosperous_metro:0 "§GProsperous Industrial Heartland. Level 10§!\n§GA busy, commercially active region with genuine momentum.§! Transit lines connect the districts. §GThe middle class exists and knows its own name.§! Destitution is present but not dominant. Healthcare turns no one away — usually. §GA region with ambitions it is slowly fulfilling.§!"
  state_gdppc_prosperous_urban:0 "§GProsperous Urbanised Region. Level 10§!\n§GFactory workers here earn a living wage and occasionally a bit more.§! The union is recognized. Shift work is hard but the rent gets paid. §GSchools stay open past primary age.§! A functioning industrial region — not glamorous, but dignified.§!"
  state_gdppc_prosperous_agrarian:0 "§GProsperous Urbanising Region. Level 10§!\n§GOrganized markets, solid roads§!, and a nascent industrial sector adding wages alongside the agricultural income. Farmers here are not rich but they are §Gnot hungry either§!. The factory recruits from the same families that work the fields. §GA region on a genuine upward trajectory.§!"
  state_gdppc_prosperous_rural:0 "§GProsperous Rural Region. Level 10§!\n§GExtraction and farming both organized and productive.§! Workers are compensated. Output is consistent. §GNot the richest ground. but a real one, properly worked§! by a workforce that stays.§!"
  state_gdppc_prosperous_wasteland:0 "§GProsperous Remote Region. Level 10§!\n§GExtraction is organized and the workers are compensated.§! Worker housing is maintained. Output is consistent, the operation experienced. §GNot the richest vein. but a real one, properly worked§! by a workforce that stays.§!"
  # ── VIBRANT (Level 9) ─────────────────────────────────────────────────
  state_gdppc_vibrant_metro:0 "§GVibrant Growing Heartland. Level 9§!\n§GA region finding its footing.§! Commerce is active, the population is employed, and §Gsome districts are genuinely pleasant§!. Infrastructure creaks in places. §GBut this region is growing into something. the gap between where it is and where it could be is closing, not widening.§!"
  state_gdppc_vibrant_urban:0 "§GVibrant Industrial Region. Level 9§!\n§GThe factories run and the wages are real.§! Not generous — §Gbut real enough that workers stay, families form, and the local economy turns§!. The weekend has meaning. The children know their letters. §GA region that functions.§!"
  state_gdppc_vibrant_agrarian:0 "§GVibrant Urbanising Region. Level 9§!\n§GThe industrial seed is planted and growing.§! §GFirst-generation factory workers§! are earning more than their farming parents did, while the farms themselves remain productive. §GThe transition is underway. messy in places, promising overall.§!"
  state_gdppc_vibrant_rural:0 "§GVibrant Rural Region. Level 9§!\n§GThe harvest is consistent and the surplus is real.§! §GFarmers here are not wealthy, but they are not subsisting§! — they are farming commercially, with market access and functioning equipment. §GA region finding its way into modernity.§!"
  state_gdppc_vibrant_wasteland:0 "§GVibrant Remote Region. Level 9§!\n§GSomething valuable is in the ground or offshore here§!, and the people working it earn enough to stay. §GThe operation is functional§!, the equipment adequate, the wages modest but present. §GA remote region that has found its rhythm.§!"
  # ── ROBUST (Level 8) ─────────────────────────────────────────────────
  state_gdppc_robust_metro:0 "§YRobust Industrial Heartland. Level 8§!\n§YA region that works§! — not glamorously, but persistently. The factories run, the transit runs, and most people have enough. §YThe gap between rich and poor is visible§! but not catastrophic. A region that hasn't fulfilled its ambitions yet, §Ybut hasn't given up either.§!"
  state_gdppc_robust_urban:0 "§YRobust Urbanised Region. Level 8§!\n§YThe wages cover necessities with something left over. sometimes.§! Shift work, modest housing, modest expectations. §YThe factories run, the workers show up§!. No comfort to spare, but there is employment, and employment is the difference.§!"
  state_gdppc_robust_agrarian:0 "§YRobust Urbanising Region. Level 8§!\n§YThe first factories have arrived and the wages are real§!, if modest. Agriculture still dominates the landscape, but §Ythe balance is shifting§!. Workers who used to farm are learning trades. §YProgress is visible here. slow, genuine, and forward.§!"
  state_gdppc_robust_rural:0 "§YRobust Rural Region. Level 8§!\n§YEnough to eat, occasionally enough to sell.§! The market is reachable. §YChildren attend school when the harvest allows.§! The land is not mechanized but it is productive. Progress is possible here — §Ynot guaranteed, but possible.§!"
  state_gdppc_robust_wasteland:0 "§YRobust Remote Region. Level 8§!\n§YSomething is being extracted here and the workers are paid for it.§! §YThe infrastructure is thin§! and the workforce small, but the output is real and the wages are honest. §YA remote region with a purpose§!, however modest.§!"
  # ── COMFORTABLE (Level 7) ─────────────────────────────────────────────────
  state_gdppc_comfortable_metro:0 "§YComfortable Major Industrial Centre. Level 7§!\n§YA region that feeds and employs its people§! — mostly. §YInfrastructure is strained§!, deprivation is visible from the wealthier districts, and §Yhealthcare turns some away§!. But commerce moves. A middle class exists, even if it is anxious. §YNot a great region. A functioning one.§!"
  state_gdppc_comfortable_urban:0 "§YComfortable Urbanised Region. Level 7§!\n§YThe factory wages are enough to live on§!, if carefully. §YRent is manageable, food is available§!, the children go to school for several years. §YNo savings to speak of§!, but no starvation either. §YA region at the lower edge of decent§! — aware of both directions from here.§!"
  state_gdppc_comfortable_agrarian:0 "§YComfortable Urbanising Region. Level 7§!\n§YIndustrialisation has begun here§! and is producing visible results — some of them good. The first factory wages are lifting families out of subsistence. §YAgriculture is still the backbone§!, but its grip is loosening as options multiply. §YA region on the cusp of real change.§!"
  state_gdppc_comfortable_rural:0 "§YComfortable Rural Region. Level 7§!\n§YThe fields produce enough§! and the markets are accessible. §YNot comfortable by any urban standard§!, but by rural standards — with access to markets, schools, and a dry roof — §Ythis region is doing adequately.§! Subsistence that crosses the line into modest sufficiency.§!"
  state_gdppc_comfortable_wasteland:0 "§YComfortable Remote Outpost. Level 7§!\n§YThe extraction is modest and the wages are thin§!, but they are present. §YA remote community that pays its own way§! — barely, but genuinely. The people here chose this life, or were born into it, and §Yit is livable§!, which is more than can be said for many.§!"
  # ── DECENT (Level 6) ─────────────────────────────────────────────────
  state_gdppc_decent_metro:0 "§YStruggling Major Industrial Centre. Level 6§!\n§YA large region with large problems.§! §OThe population grew faster than the infrastructure§!, and the gap shows — overcrowded settlements, overloaded transit, healthcare at its limit. §YBut commerce moves§!, the factories produce, the region survives. §OIt could be much worse. It has been.§!"
  state_gdppc_decent_urban:0 "§YStruggling Urbanised Region. Level 6§!\n§YThe factories pay§! — not well, but they pay. §OWorkers cover food and rent§! if nothing goes wrong. §YA month of illness or an injury ends that balance§!. The children work summers. The union is weak. §OA region that functions, barely§!, because the alternative is worse.§!"
  state_gdppc_decent_agrarian:0 "§YEmerging Industrial Region. Level 6§!\n§YThe first workshops and small factories have appeared§!, but the transition is fragile. Most people still farm. §OThe industrial wages are low§!, the working conditions unregulated, and the promise of modernity feels more distant than the recruiters suggested. §YThe region is changing. whether for better or worse remains to be seen.§!"
  state_gdppc_decent_rural:0 "§YModest Rural Region. Level 6§!\n§YThe harvest feeds the family and sometimes the market.§! §OThe roads are unpaved§! but passable. §YDebt is present but not crushing. yet§!. §OThe landlord takes his share§!, the market takes its cut, and what remains is enough to try again next season.§!"
  state_gdppc_decent_wasteland:0 "§YMarginal Remote Region. Level 6§!\n§YSomething is being extracted here§!, but §Othe infrastructure is thin§! and the workforce too small to work it efficiently. §YOutput is real but well below potential.§! The land has value — §Othe question is whether anyone has the means to unlock it.§!"
  # ── MEAGER (Level 5) ─────────────────────────────────────────────────
  state_gdppc_meager_metro:0 "§OMeager Overcrowded Heartland. Level 5§!\n§OA region that outgrew its means.§! Vast informal settlements sprawl across the landscape. §OThe sewers don't reach the outskirts§!, the schools are oversubscribed, and §Ohealthcare is for those who can pay§!. Industry exists but captures the wealth before it can circulate. §RA region of many people generating little prosperity for most of them.§!"
  state_gdppc_meager_urban:0 "§OMeager Industrial Region. Level 5§!\n§OThe factory whistle blows but the wages barely cover bread.§! §OChild labour is common§! where the law allows, and the law is permissive. §OThe workers have no union§!, no recourse, and no expectation of improvement. §RA region that works itself to exhaustion for someone else's profit.§!"
  state_gdppc_meager_agrarian:0 "§OMeager Proto-Industrial Region. Level 5§!\n§OThe factories are here, but the workers wish they weren't.§! §OWages are barely above what subsistence farming paid§!, the conditions are dangerous, and the promised prosperity of industrialisation §Ohas not materialized for the people doing the work§!. The fields are still more honest than the factory floors.§!"
  state_gdppc_meager_rural:0 "§OMeager Rural Region. Level 5§!\n§OThe fields are worked by hand§!, the roads are mud, and §Othe harvest feeds the landlord first§!. What remains goes to the family — if enough remains. §ODebt is a permanent condition§!, inherited and passed on. The nearest market is a long walk and the prices are set by someone else.§!"
  state_gdppc_meager_wasteland:0 "§OMeager Remote Outpost. Level 5§!\n§ONothing grows easily here§! and extraction is inefficient and poorly compensated. §OThe population is too small§!, the equipment too primitive, and the connection to any market §Otoo tenuous to generate meaningful output§!. §RWhatever wealth exists in the ground stays there.§!"
  # ── GRIMY (Level 4) ─────────────────────────────────────────────────
  state_gdppc_grimy_metro:0 "§OGrimy Industrial Sprawl. Level 4§!\n§OA region that failed to grow into its own ambitions.§! §RTenements pack six to a room§!, sewers overflow, and healthcare turns away those who can't pay. §OIndustry exists but pays poverty wages§!. §RThe wealthy live behind walls. The rest live outside them.§!"
  state_gdppc_grimy_urban:0 "§OGrimy Industrial Slum. Level 4§!\n§OThe factories run on desperation.§! §RWages are below subsistence§!, hours are unlimited, and injuries are the worker's problem. §OWhat little the workers earn§! is extracted back by the company store and the landlord. §RA region in which labour has no rights and exercises none.§!"
  state_gdppc_grimy_agrarian:0 "§OGrimy Transitional Ruin. Level 4§!\n§OThe worst of both worlds.§! §RThe farms have been abandoned§! or consolidated by absentee landlords. The factories that replaced them pay §Rwages below what the fields used to yield§!. The workforce is trapped between a dying agricultural economy and a predatory industrial one. §RA transition that has failed the people living through it.§!"
  state_gdppc_grimy_rural:0 "§OGrimy Rural Region. Level 4§!\n§OThe fields barely yield enough to survive.§! §RThe landlord takes the majority§!, leaving the farmers with what cannot be seized. §ONo surplus§!, no savings, no equipment beyond what was inherited in poor condition. §RA region that has forgotten what good seasons feel like.§!"
  state_gdppc_grimy_wasteland:0 "§OGrimy Resource Outpost. Level 4§!\n§OA camp rather than a community.§! §RScratch extraction§! — minimal equipment, no infrastructure, workers who arrived with nothing and are saving nothing. §OThe resource is real§!, the operation barely functional. §RA place that extracts and discards both ore and men.§!"
  # ── HARDSCRABBLE (Level 3) ─────────────────────────────────────────────────
  state_gdppc_hardscrabble_metro:0 "§RHardscrabble Urban Crisis. Level 3§!\n§RA densely populated region in acute distress.§! §RDisease spreads through overcrowded settlements§! unchecked, and §Remployment is a lottery§! most lose. What industry remains pays §Rbelow survival wages§!. §RThis region is not functioning. it is enduring.§!"
  state_gdppc_hardscrabble_urban:0 "§RHardscrabble Industrial Ruin. Level 3§!\n§RThe factory floors are barely maintained§!, the wages are a gesture rather than a salary. §RWorkers sleep in shifts§! in shared dormitories. §RChild mortality is high§!. The operators extract what they can and §Rreinvest nothing§!. This industrial region is consuming itself.§!"
  state_gdppc_hardscrabble_agrarian:0 "§RHardscrabble Failed Transition. Level 3§!\n§RThe region attempted to industrialise and the attempt collapsed.§! The farms were cleared, the factories never came, or came and failed. §RThe workforce is scattered§! between exhausted fields and silent factory shells. §RThere is nothing to fall back on§! and nothing to fall forward into.§!"
  state_gdppc_hardscrabble_rural:0 "§RHardscrabble Rural Region. Level 3§!\n§RSubsistence farming, no surplus, no tools.§! The land is the entire world, and it is a world of mud floors, unreliable wells, and §Rseasons that determine whether the family eats or doesn't§!. There is no market to sell to. There is no surplus to sell. §RThis is survival, not agriculture.§!"
  state_gdppc_hardscrabble_wasteland:0 "§RHardscrabble Remote Wasteland. Level 3§!\n§RThe land yields almost nothing§! and the handful of people on it know it. §RNo roads, no equipment§!, no reason to stay except §Rnowhere better to go§!. What little extraction happens is by hand and produces enough to eat and nothing else. §RThis region is endured, not inhabited.§!"
  # ── SQUALID (Level 2) ─────────────────────────────────────────────────
  state_gdppc_squalid_metro:0 "§RSqualid Urban Catastrophe. Level 2§!\n§RA densely populated region collapsing under its own weight.§! §ROpen sewers run between the settlements§!. §RDisease is endemic§!. What industry exists is predatory — paying nothing, demanding everything. §RGovernance has retreated§! and left the margins to fend for themselves. §RThis region is not struggling. It is failing.§!"
  state_gdppc_squalid_urban:0 "§RSqualid Industrial Wreckage. Level 2§!\n§RThe factory shells remain§! but the machinery is idle or scavenged. Workers who haven't fled §Rsurvive on whatever the informal economy provides§!. There is no wage to speak of, no functioning supply chain, and §Rno prospect of recovery without outside intervention.§!"
  state_gdppc_squalid_agrarian:0 "§RSqualid Destitute Region. Level 2§!\n§RThe fields are not enough.§! Whether from drought, landlord extraction, war damage, or §Rsheer exhaustion of the soil§! — this region cannot feed itself. §RWhat little surplus once existed has been consumed.§! §RThe people are leaving. Or dying.§!"
  state_gdppc_squalid_rural:0 "§RSqualid Abandoned Territory. Level 2§!\n§RThe land has been stripped and left.§! §RWhatever was here has been extracted§! by those who moved on. What remains is a §Rscattered remnant population§! with no tools, no market, no future. §RThis territory exists on maps. Nowhere else.§!"
  state_gdppc_squalid_wasteland:0 "§RSqualid Remote Ruin. Level 2§!\n§RThe extraction stopped and the people didn't leave. or couldn't.§! §RWhat remains is a skeleton§! of the operation it once was: broken equipment, collapsed structures, and a population §Rthat subsists on whatever the gutted land still yields§!. §RThere is no recovery coming.§!"
  # ── ABJECT (Level 1) ─────────────────────────────────────────────────
  state_gdppc_abject_metro:0 "§RAbject Urban Collapse. Level 1§!\n§RA densely populated region in name only.§! The infrastructure has §Rcollapsed under the weight of its own population§! — disease, starvation, and violence fill the gap left by absent governance. §RWhat industry existed has been looted or destroyed.§! §RThis is not poverty. This is catastrophe made permanent.§!"
  state_gdppc_abject_urban:0 "§RAbject Industrial Ruin. Level 1§!\n§RNothing functions.§! The machines are silent, §Rthe workforce has scattered§!, the structures are occupied by people with nowhere else to be. §RNo wage, no supply, no output§!. What was once an industrial region is §Rnow a ruin with a population§! that doesn't know where else to go.§!"
  state_gdppc_abject_agrarian:0 "§RAbject Famine Region. Level 1§!\n§RStarvation is not a crisis here. it is the baseline.§! §RThe fields yield nothing meaningful§!, the tools are broken or absent, and §Rthe harvest is a recurring disappointment§! that grows worse with each season of exhausted soil. §RThe people who remain do so because they have no means to leave.§!"
  state_gdppc_abject_rural:0 "§RAbject Rural Wasteland. Level 1§!\n§RThere is nothing here.§! No functioning economy, no extractable surplus, §Rno population large enough to matter§! to any calculation except a census. §RThe land exists.§! §RNothing productive happens on it.§!"
  state_gdppc_abject_wasteland:0 "§RAbject Forgotten Territory. Level 1§!\n§RThis territory has been forgotten by everyone, including the people in it.§! §RNo roads reach it§!, no markets serve it, no authority administers it. §RThe population — what little remains — survives§! on terms that no census has ever accurately captured. §RIt is the edge of the map. Beyond it, nothing.§!"
