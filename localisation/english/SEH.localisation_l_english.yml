l_english:
  var_SEH_debug: "Unknown (Report IF Owned)"
# Species map mode
  MAPMODE_SEH_STATE_SPECIES_MAP: "§YState Species§!"
  MAPMODE_SEH_STATE_SPECIES_MAP_NAME: "Species"
  MAPMODE_SEH_STATE_SPECIES_MAP_DESCRIPTION: "Shows the majority Species in the world map."

  SEH_state_species_map_tooltip: "§Y[FROM.GetSEH_Species]§!"
  SEH_state_species_map_tooltip_delayed: "(§Y[FROM.Controller.GetNameWithFlag]§!): [FROM.GetName]\n§LHas a majority species of §Y[FROM.GetSEH_Species]§!.§!"

# Ethnos map mode
  MAPMODE_SEH_STATE_ETHNOS_MAP: "§YState Ethnos§!"
  MAPMODE_SEH_STATE_ETHNOS_MAP_NAME: "Ethnos"
  MAPMODE_SEH_STATE_ETHNOS_MAP_DESCRIPTION: "Shows the majority Ethnos in the world map."

  SEH_state_ethnos_map_tooltip: "§Y[FROM.GetSEH_Ethnos]§!"
  SEH_state_ethnos_map_tooltip_delayed: "(§Y[FROM.Controller.GetNameWithFlag]§!): [FROM.GetName]\n§LHas a majority ethnos of §Y[FROM.GetSEH_Ethnos]§!.§!"

# Heritage map mode
  MAPMODE_SEH_STATE_HERITAGE_MAP: "§YState Heritage§!"
  MAPMODE_SEH_STATE_HERITAGE_MAP_NAME: "Heritage"
  MAPMODE_SEH_STATE_HERITAGE_MAP_DESCRIPTION: "Shows the majority Heritage in the world map."

