  OCfA_mob_breakdown_desc: "§HIndustrial Mobilization:§!\n - Current Consumer Goods: [?OCfA_current_cg_total|%Y]\n - Industrial Efficiency: [?OCfA_econ_efficiency_factor|%G]\n\n§LHigh your consumer goods demand reduces the efficiency of your battalion capacity. Mobilize your economy to utilize your full battalion capacity for the front lines.§!\n\n"
  OCfA_mob_disabled_desc: ""

  OCfA_upkeep_desc: "§HMilitary-Industrial Complex Upkeep:§!\n - Strain Factor: [?OCfA_infra_strain|Y2]\n\n§LThe sheer scale of your military-industrial complex creates administrative friction. Your efficiency is divided by this factor to simulate the cost of maintaining extensive military economy.§!\n\n"
  OCfA_upkeep_none: ""

  OCfA_RULE_WEIGHTING: "Battalion Weighting"
  OCfA_RULE_WEIGHT_OFF: "Uniform (1 Battalion = 1 Cap)"
  OCfA_RULE_WEIGHT_OFF_DESC: "Every battalion, regardless of type or equipment cost, consumes exactly 1 unit of Operational Capacity."
  OCfA_RULE_WEIGHT_ON: "Weighted (Type Based)"
  OCfA_RULE_WEIGHT_ON_DESC: "Heavier battalions consume more capacity. Infantry: 1, Artillery/Motorized: 2, Armored: 3+."

  OCfA_RULE_BUFF: "Battalion Under-Capacity Bonus"
  OCfA_RULE_BUFF_ON: "Enabled"
  OCfA_RULE_BUFF_ON_DESC: "Exceeding the Battalion Capacity will apply significant scaling penalties to Training Time, Mobilization Speed, Army Morale, and Planning Speed."
  OCfA_RULE_BUFF_OFF: "Disabled"
  OCfA_RULE_BUFF_OFF_DESC: "The Battalion Capacity system will act as a purely informative tracker. No combat or logistical penalties will be applied regardless of army size."

  OCfA_RULE_MOBILIZATION: "Industrial Mobilization Impacts Army"
  OCfA_RULE_MOB_ON: "Enabled"
  OCfA_RULE_MOB_ON_DESC: "Operational battalion capacity is tied to your consumer goods usage. Civil economies will have reduced capacity, while a fully mobilized War Economy provides the maximum support for your divisions."
  OCfA_RULE_MOB_OFF: "Disabled"
  OCfA_RULE_MOB_OFF_DESC: "Industry provides 100% logistical support for your battalion capacity regardless of your current economic law or consumer goods requirements."

  OCfA_RULE_STRAIN: "Military-Industrial Complex Upkeep"
  OCfA_RULE_STRAIN_ON: "Enabled"
  OCfA_RULE_STRAIN_ON_DESC: "The sheer scale of a massive military-industrial complex faces diminishing returns. Your logistical efficiency is reduced as your total military factory count increases."
  OCfA_RULE_STRAIN_OFF: "Disabled"
  OCfA_RULE_STRAIN_OFF_DESC: "Large numbers of military factories do not create baseline administrative strain."
