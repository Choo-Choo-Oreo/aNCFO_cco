  OCfA_opereation_capacity_dynamic_modifier: "Operational Battalion Capacity"
  OCfA_battalion_label: "§HOperational Battalion Capacity§!"
  OCfA_battalion_desc: "Your army's operational scale is supported by your nation's population base and industrial output. Exceeding this limit creates significant logistical strain on your divisions.\n\n[OCfA_load_type_loc]: [OCfA_battalion_count_loc]/[?OCfA_calculated_battalion_capacity|Y0] \n\n§HPopulation Contribution:§!\n - §YCore States:§! [?OCfA_count_core|Y]\n   ([?OCfA_pop_k_core|Y1]k Pop * [?OCfA_pop_core_weight_value|G2] Weight) / [?OCfA_pop_divisor_value|0] = §G[?OCfA_core_pop|1]§!\n - §YNon-Core States:§! [?OCfA_count_non_core|Y]\n   ([?OCfA_pop_k_non_core|Y1]k Pop * [?OCfA_pop_non_core_weight_value|G2] Weight) / [?OCfA_pop_divisor_value|0] = §G[?OCfA_non_core_pop|1]§!\n - §YAdministrative Size:§!\n   [?num_owned_states|Y] Owned States * [?OCfA_state_weight_value|G1] Weight = §G[?OCfA_base_states|1]§!\n\n§HIndustrial Contribution:§!\n - Military Factories: §Y[?num_of_military_factories|0]§! * §G[?OCfA_mil_weight_value|1]§!\n - Civilian Factories: §Y[?num_of_civilian_factories|0]§! * §G[?OCfA_civ_weight_value|1]§!\n - Naval Dockyards: §Y[?num_of_naval_factories|0]§! * §G[?OCfA_doc_weight_value|1]§!\n - Total Factory Weight: §Y[?OCfA_factory_points|1]§!\n - Industrialized Factor: §Yx§![?OCfA_industry_factor|Y2]\n\n§HGlobal Multipliers:§![OCfA_is_major_loc][OCfA_has_war_loc][OCfA_battalion_limit_factory_bonus_loc][OCfA_battalion_limit_pop_bonus_loc][OCfA_battalion_limit_pop_core_bonus_loc][OCfA_battalion_limit_pop_non_core_bonus_loc]\n - Flat Capacity Modifier: [?modifier@OCfA_battalion_limit_bonus|Y0]\n - Minimum Allowed: [?OCfA_min_capacity_value|Y0]\n - Maximum Allowed: [?OCfA_max_capacity_value|Y0]\n\n[OCfA_mobilization_loc][OCfA_upkeep_loc]§HCurrent Modifiers:§!\n [?OCfA_ttf_ocd_value_inversion|Y%1] Training Time Factor\n [?OCfA_moz_ocd_value|=%+1] Mobilization Factor\n [?OCfA_amf_ocd_value|=%+1] Army Morale Factor\n [?OCfA_pls_ocd_value|=%+1] Planning Speed Factor\n\n§GClick this indicator to refresh your battalion capacity immediately.§!"

  OCfA_load_weighted: "§HArmy Composition Breakdown:§!\n - Infantry (§Yx§![?OCfA_infantry_weight_value|Y1]): [?num_battalions_with_type@infantry|G0] (Value: [?OCfA_bat_inf|Y0])\n - Light Armor (§Yx§![?OCfA_light_armor_weight_value|Y1]): [?num_battalions_with_type@light_armor|G0] (Value: [?OCfA_bat_lar|Y0])\n - Medium Armor (§Yx§![?OCfA_medium_armor_weight_value|Y1]): [?num_battalions_with_type@medium_armor|G0] (Value: [?OCfA_bat_mar|Y0])\n - Heavy Armor (§Yx§![?OCfA_heavy_armor_weight_value|Y1]): [?num_battalions_with_type@heavy_armor|G0] (Value: [?OCfA_bat_har|Y0])\n - Motorized (§Yx§![?OCfA_motorized_weight_value|Y1]): [?num_battalions_with_type@motorized|G0] (Value: [?OCfA_bat_mot|Y0])\n - Mechanized (§Yx§![?OCfA_mechanized_weight_value|Y1]): [?num_battalions_with_type@mechanized|G0] (Value: [?OCfA_bat_mec|Y0])\n - Miscellaneous (§Yx1.0§!): [?OCfA_bat_misc|G0]\n\nTotal Load"
