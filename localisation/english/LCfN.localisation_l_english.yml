l_english:
  LCfN_naval_count: "[LCfN_naval_count_loc]/[?LCfN_calculated_naval_cap|Y0]"
  LCfN_naval_capacity_dynamic_modifier: "Naval Industrial Capacity"
  LCfN_naval_label: "§HNaval Industrial Capacity§!"
  LCfN_naval_desc: "Your navy is supported by the combined output of your dockyards and factories. Exceeding this limit strains your maritime logistics.\n\n[LCfN_load_type_loc]: [LCfN_naval_count_loc]/[?LCfN_calculated_naval_cap|Y0]\n\n§HIndustrial Breakdown:§!\n - Military Factories (§Yx§![?LCfN_mil_weight_value|Y1]): [?num_of_military_factories|G0] (Value: [?LCfN_mil_factories|Y0])\n - Civilian Factories (§Yx§![?LCfN_civ_weight_value|Y1]): [?num_of_civilian_factories|G0] (Value: [?LCfN_civ_factories|Y0])\n - Naval Dockyards (§Yx§![?LCfN_doc_weight_value|Y1]): [?num_of_naval_factories|G0] (Value: [?LCfN_nav_dockyards|Y0])\n\n[LCfN_mobilization_loc][LCfN_upkeep_loc]§HCurrent Modifier:§!\n [?LCfN_icd_ncd_value|=%+1] Dockyard Output\n\n[LCfN_formula_loc]\n\n§GClick this indicator to refresh your naval capacity immediately.§!"

  LCfN_load_weighted: "§HFleet Breakdown:§!\n - $battle_cruiser$ (§Yx§![?LCfN_bc_weight_value|Y1]): [?num_ships_with_type@battle_cruiser|G0] (Value: [?LCfN_t_bc|Y0])\n - $battleship$ (§Yx§![?LCfN_bb_weight_value|Y1]): [?num_ships_with_type@battleship|G0] (Value: [?LCfN_t_bb|Y0])\n - $carrier$ (§Yx§![?LCfN_cv_weight_value|Y1]): [?num_ships_with_type@carrier|G0] (Value: [?LCfN_t_cv|Y0])\n - $destroyer$ (§Yx§![?LCfN_dd_weight_value|Y1]): [?num_ships_with_type@destroyer|G0] (Value: [?LCfN_t_dd|Y0])\n - $heavy_cruiser$ (§Yx§![?LCfN_ca_weight_value|Y1]): [?num_ships_with_type@heavy_cruiser|G0] (Value: [?LCfN_t_ca|Y0])\n - $light_cruiser$ (§Yx§![?LCfN_cl_weight_value|Y1]): [?num_ships_with_type@light_cruiser|G0] (Value: [?LCfN_t_cl|Y0])\n - $submarine$ (§Yx§![?LCfN_ss_weight_value|Y1]): [?num_ships_with_type@submarine|G0] (Value: [?LCfN_t_ss|Y0])\n - Miscellaneous (x§H1.0§!): [?LCfN_nav_misc|G0]\n\nTotal Load"
  LCfN_load_standard: "Current Load"

  LCfN_count_red: "§R[?LCfN_current_ship_load|0]§!"
  LCfN_count_yellow: "§H[?LCfN_current_ship_load|0]§!"
  LCfN_count_green: "§G[?LCfN_current_ship_load|0]§!"

  LCfN_mob_breakdown_desc: "§HIndustrial Mobilization:§!\n - Current Consumer Goods: [?LCfN_current_cg_total|%Y]\n - Industrial Efficiency: [?LCfN_econ_efficiency_factor|%G]\n\n§LHigh your consumer goods demand reduces the efficiency of your naval logistical capacity. Mobilize your economy to utilize your full industrial capacity.§!\n\n"
  LCfN_mob_disabled_desc: ""

  LCfN_upkeep_desc: "§HInfrastructure Upkeep:§!\n - Strain Factor: [?LCfN_infra_strain|Y2]\n\n§LThe sheer scale of your dockyards creates logistical friction. Your efficiency is divided by this factor to simulate the cost of maintaining extensive military economy.§!\n\n"
  LCfN_upkeep_none: ""

  LCfN_linear_desc: "§LThis system uses a Linear curve. Efficiency changes at a flat, constant rate. Every ship over your capacity adds the exact same penalty, providing a predictable and stable experience.§!"
  LCfN_quadratic_desc: "§LThis system uses a Quadratic curve. Penalties start small but accelerate rapidly as you exceed your capacity. There is no limit to how high the penalty can climb.§!"
  LCfN_sigmoid_desc: "§LThis system uses a Sigmoid (S-Curve). It features a 'soft' start for minor over-extensions, but scales sharply in the middle before hitting a hard industrial ceiling based on your dockyard count.§!"
  LCfN_logarithmic_desc: "§LThis system uses a Logarithmic curve. Early ships over the cap have a high impact on efficiency, but the penalty growth slows down significantly as your fleet continues to grow.§!"
  LCfN_step_desc: "§LThis system uses fixed thresholds. Instead of a smooth curve, efficiency drops in sudden, large 'steps' at specific milestones (e.g., -1, -50, and -100 ships over cap).§!"
  LCfN_hyperbolic_desc: "§LThis system uses a Hyperbolic 'Death Spiral.' Penalties are manageable until you approach a critical buffer, at which point logistics collapse entirely and efficiency drops toward zero.§!"

  LCfN_FORMULA_RULE: "Naval Bonus Scaling"
  LCfN_RULE_LINEAR: "Linear (Consistent)"
  LCfN_RULE_LINEAR_DESC: "§LThis system uses a Linear curve. Efficiency changes at a flat, constant rate. Every ship over your capacity adds the exact same penalty, providing a predictable and stable experience.\n\n§HExample (Cap C=240, Divisor K=100):§!\nDiff (D) = C - S\nFormula: D / K\n\n§G40 Ships (D=200):§! 200 / 100 = §G+200%§!\n§G200 Ships (D=40):§! 40 / 100 = §G+40%§!\n§R280 Ships (D=-40):§! -40 / 100 = §R-40%§!§!"
  LCfN_RULE_QUADRATIC: "Quadratic (Scaling)"
  LCfN_RULE_QUADRATIC_DESC: "§LThis system uses a Quadratic curve. Penalties start small but accelerate rapidly as you exceed your capacity. There is no limit to how high the penalty can climb.\n\n§HExample (Cap C=240, Divisor K=5000):§!\nFormula: (D * D) / K\n\n§G40 Ships (D=200):§! (200^2) / 5000 = §G+800%§!\n§G200 Ships (D=40):§! (40^2) / 5000 = §G+32%§!\n§R280 Ships (D=-40):§! (-40^2) / 5000 = §R-32%§!§!"
  LCfN_RULE_SIGMOID: "Sigmoid (Balanced)"
  LCfN_RULE_SIGMOID_DESC: "§LThis system uses a Sigmoid (S-Curve). It features a 'soft' start for minor over-extensions, but scales sharply in the middle before hitting a hard industrial ceiling based on your dockyard count.\n\n§HExample (Cap C=240, Divisor K=5000):§!\nFormula: (D * D) / K\nLimit: Dockyards (20) * 0.2 = §Y+/-400% Limit§!\n\n§G40 Ships (D=200):§! (200^2) / 5000 = §G+400%§! (Capped)\n§G200 Ships (D=40):§! (40^2) / 5000 = §G+32%§!\n§R280 Ships (D=-40):§! (-40^2) / 5000 = §R-32%§!§!"
  LCfN_RULE_LOGARITHMIC: "Logarithmic (Early Impact)"
  LCfN_RULE_LOGARITHMIC_DESC: "§LThis system uses a Logarithmic curve. Early ships over the cap have a high impact on efficiency, but the penalty growth slows down significantly as your fleet continues to grow.\n\n§HExample (Cap C=240, Max M=5.0):§!\nFormula: (M * D) / (D + 100)\n\n§G40 Ships (D=200):§! (5 * 200) / 300 = §G+333%§!\n§G200 Ships (D=40):§! (5 * 40) / 140 = §G+142%§!\n§R280 Ships (D=-40):§! (5 * -40) / 140 = §R-142%§!§!"
  LCfN_RULE_STEP: "Step Function (Milestones)"
  LCfN_RULE_STEP_DESC: "§LThis system uses fixed thresholds. Instead of a smooth curve, efficiency drops in sudden, large 'steps' at specific milestones.\n\n§HExample (Cap C=240):§!\nThresholds: 1, 50, 100 ships over\n\n§G40 Ships (Under):§! Base Bonus §G+10%§!\n§G200 Ships (Under):§! Base Bonus §G+10%§!\n§R280 Ships (40 Over):§! Exceeds Threshold 1. Penalty: §R-25%§!§!"
  LCfN_RULE_HYPERBOLIC: "Hyperbolic (Critical)"
  LCfN_RULE_HYPERBOLIC_DESC: "§LThis system uses a Hyperbolic 'Death Spiral.' Penalties are manageable until you approach a critical buffer, at which point logistics collapse entirely and efficiency drops toward zero.\n\n§HExample (Cap C=240, Buffer B=100):§!\nFormula Over Cap: 1 / (B - Over_Amount)\n\n§G40 Ships (Under):§! Linear Bonus §G+200%§!\n§G200 Ships (Under):§! Linear Bonus §G+40%§!\n§R280 Ships (40 Over):§! 1 / (100 - 40) = §R-1.7%§! (Note: At 95 Over, this spikes to -20%)§!"

  LCfN_RULE_SCALING_LOGIC: "Naval Bonus Calculation"
  LCfN_RULE_DISTANCE: "Absolute Distance"
  LCfN_RULE_DISTANCE_DESC: "Logistics are based on the raw number of ships over or under the cap."
  LCfN_RULE_PERCENT: "Saturation Percentage"
  LCfN_RULE_PERCENT_DESC: "Logistics are based on the percentage of capacity used. Better for smaller nations."

  LCfN_RULE_CLAMP: "Naval Bonus Safety Clamp"
  LCfN_RULE_CLAMP_ON: "Enabled (Recommended)"
  LCfN_RULE_CLAMP_ON_DESC: "Prevents naval production penalties from exceeding -100%. This ensures that even the most overextended fleet can still eventually produce or repair ships, albeit very slowly."
  LCfN_RULE_CLAMP_OFF: "Disabled"
  LCfN_RULE_CLAMP_OFF_DESC: "Removes the safety floor. Extreme over-extension can lead to penalties far exceeding -100%, effectively halting all naval industrial output until the fleet is reduced."
  LCfN_RULE_UNCLAMPED_PENALTY: "No Buffs: Over-Capacity Focus"
  LCfN_RULE_UNCLAMPED_PENALTY_DESC: "Removes all bonuses for being under-capacity. Penalties for exceeding naval logistical limits are now uncapped and can reach massive levels. To prevent total economic collapse, nations over-capacity receive a simulated trickle of convoys based on their total dockyard count."

  LCfN_RULE_WEIGHTING: "Ship Weighting"
  LCfN_RULE_WEIGHT_OFF: "Uniform (1 Ship = 1 Cap)"
  LCfN_RULE_WEIGHT_OFF_DESC: "Every ship, regardless of size, consumes exactly 1 unit of Naval Capacity."
  LCfN_RULE_WEIGHT_ON: "Weighted (Hull Based)"
  LCfN_RULE_WEIGHT_ON_DESC: "Larger ships consume more capacity. Destroyers/Subs: 1, Cruisers: 2, Capitals: 4+."

  LCfN_RULE_MOBILIZATION: "Industrial Mobilization Impacts Navy"
  LCfN_RULE_MOB_ON: "Enabled"
  LCfN_RULE_MOB_ON_DESC: "Naval logistical efficiency is tied to your consumer goods usage. Civil economies will have reduced efficiency, while War Economies provide the full industrial support for the fleet."
  LCfN_RULE_MOB_OFF: "Disabled"
  LCfN_RULE_MOB_OFF_DESC: "Industry provides 100% logistical support regardless of your current economic law or consumer goods requirements."

  LCfN_RULE_STRAIN: "Dockyard Upkeep"
  LCfN_RULE_STRAIN_ON: "Enabled"
  LCfN_RULE_STRAIN_ON_DESC: "Large numbers of dockyards face diminishing returns. Your logistical bonus is divided based on your total dockyard count."
  LCfN_RULE_STRAIN_OFF: "Disabled"
  LCfN_RULE_STRAIN_OFF_DESC: "Dockyards do not create baseline logistical strain."
