  MRC.0.t: "Merchant Isles Military?"
  MRC.0.d: "The military of the nation originated from the Isles Liberation Force. Which consisted of two major independent factions, the Insulae People Guild and the Merchant Funders. Once the nation's independence was secured, the Merchant Funders achieved the greatest degree of influence over the state. Allowing for the formation of the current Republic.\n\nThe Insulae People were adamant on continuing the trend of progressive and democratic reforms. The Upper Council conceded and passed a decree where the Merchant Isles Military were to reform into the Insulae Defence Force. This reform allows non-elite classes to take on senior-rank positions should they show an adequate performance."
  MRC.0.OptA:0 "We stand with our Progressive Military!\nIDF, IDF, IDF!"
