l_english:
  LCoN_naval_count_loc: "[LCoN_naval_count_loc]/[?calculated_naval_cap|H0]"
  LCoN_naval_capacity_dynamic_modifier: "Naval Industrial Capacity"
  LCoN_naval_label: "§HNaval Industrial Capacity§!"
  LCoN_naval_desc: "Your navy is supported by the combined output of your dockyards and factories. Exceeding this limit strains your maritime logistics.\n\nCurrent Ships: [LCoN_naval_count_loc]/[?calculated_naval_cap|H0]\n\n§HIndustrial Breakdown:§!\n - Naval Dockyards (x[?doc_weight_value]): [?num_of_naval_factories|G0] (Value: [?dockyard_weighted_value|H0])\n - Military Factories (x[?mil_weight_value]): [?num_of_military_factories|G0] (Value: [?temp_mil_factories|H0])\n - Civilian Factories (x[?civ_weight_value]): [?num_of_civilian_factories|G0] (Value: [?temp_civ_factories|H0])\n\n[LCoN_mobilization_loc]\n\n§HCurrent Modifier:§!\n [?LCoN_icd_ncd_value|=%+1] Dockyard Output\n\n[LCoN_formula_loc]\n\n§GClick this indicator to refresh your logistics status immediately.§!"
  LCoN_mob_breakdown_desc: "§HIndustrial Mobilization:§!\n - Current Consumer Goods: [?current_cg_total|%Y]\n - Logistical Efficiency: [?econ_efficiency_factor|%G]\n\n§LHigh consumer demand reduces the efficiency of your naval logistics. Mobilize your economy to utilize your full industrial capacity.§!"
  LCoN_mob_disabled_desc: "§HIndustrial Mobilization:§! §RDisabled§!"
  LCoN_linear_desc: "§LThis system uses a Linear curve. Efficiency changes at a flat, constant rate. Every ship over your capacity adds the exact same penalty, providing a predictable and stable experience.§!"
  LCoN_quadratic_desc: "§LThis system uses a Quadratic curve. Penalties start small but accelerate rapidly as you exceed your capacity. There is no limit to how high the penalty can climb.§!"
  LCoN_sigmoid_desc: "§LThis system uses a Sigmoid (S-Curve). It features a 'soft' start for minor over-extensions, but scales sharply in the middle before hitting a hard industrial ceiling based on your dockyard count.§!"
  LCoN_logarithmic_desc: "§LThis system uses a Logarithmic curve. Early ships over the cap have a high impact on efficiency, but the penalty growth slows down significantly as your fleet continues to grow.§!"
  LCoN_step_desc: "§LThis system uses fixed thresholds. Instead of a smooth curve, efficiency drops in sudden, large 'steps' at specific milestones (e.g., -1, -50, and -100 ships over cap).§!"
  LCoN_hyperbolic_desc: "§LThis system uses a Hyperbolic 'Death Spiral.' Penalties are manageable until you approach a critical buffer, at which point logistics collapse entirely and efficiency drops toward zero.§!"

  LCoN_count_red: "§R[?num_ships|0]§!"
  LCoN_count_yellow: "§H[?num_ships|0]§!"
  LCoN_count_green: "§G[?num_ships|0]§!"

  LCoN_FORMULA_RULE: "Naval Logistics Scaling"
  LCoN_RULE_LINEAR: "Linear (Consistent)"
  LCoN_RULE_LINEAR_DESC:0 "§LThis system uses a Linear curve. Efficiency changes at a flat, constant rate. Every ship over your capacity adds the exact same penalty, providing a predictable and stable experience.\n\n§HExample (Cap C=240, Divisor K=100):§!\nDiff (D) = C - S\nFormula: D / K\n\n§G40 Ships (D=200):§! 200 / 100 = §G+200%§!\n§G200 Ships (D=40):§! 40 / 100 = §G+40%§!\n§R280 Ships (D=-40):§! -40 / 100 = §R-40%§!§!"
  LCoN_RULE_QUADRATIC: "Quadratic (Scaling)"
  LCoN_RULE_QUADRATIC_DESC:0 "§LThis system uses a Quadratic curve. Penalties start small but accelerate rapidly as you exceed your capacity. There is no limit to how high the penalty can climb.\n\n§HExample (Cap C=240, Divisor K=5000):§!\nFormula: (D * D) / K\n\n§G40 Ships (D=200):§! (200^2) / 5000 = §G+800%§!\n§G200 Ships (D=40):§! (40^2) / 5000 = §G+32%§!\n§R280 Ships (D=-40):§! (-40^2) / 5000 = §R-32%§!§!"
  LCoN_RULE_SIGMOID: "Sigmoid (Balanced)"
  LCoN_RULE_SIGMOID_DESC:0 "§LThis system uses a Sigmoid (S-Curve). It features a 'soft' start for minor over-extensions, but scales sharply in the middle before hitting a hard industrial ceiling based on your dockyard count.\n\n§HExample (Cap C=240, Divisor K=5000):§!\nFormula: (D * D) / K\nLimit: Dockyards (20) * 0.2 = §Y+/-400% Limit§!\n\n§G40 Ships (D=200):§! (200^2) / 5000 = §G+400%§! (Capped)\n§G200 Ships (D=40):§! (40^2) / 5000 = §G+32%§!\n§R280 Ships (D=-40):§! (-40^2) / 5000 = §R-32%§!§!"
  LCoN_RULE_LOGARITHMIC: "Logarithmic (Early Impact)"
  LCoN_RULE_LOGARITHMIC_DESC:0 "§LThis system uses a Logarithmic curve. Early ships over the cap have a high impact on efficiency, but the penalty growth slows down significantly as your fleet continues to grow.\n\n§HExample (Cap C=240, Max M=5.0):§!\nFormula: (M * D) / (D + 100)\n\n§G40 Ships (D=200):§! (5 * 200) / 300 = §G+333%§!\n§G200 Ships (D=40):§! (5 * 40) / 140 = §G+142%§!\n§R280 Ships (D=-40):§! (5 * -40) / 140 = §R-142%§!§!"
  LCoN_RULE_STEP: "Step Function (Milestones)"
  LCoN_RULE_STEP_DESC:0 "§LThis system uses fixed thresholds. Instead of a smooth curve, efficiency drops in sudden, large 'steps' at specific milestones.\n\n§HExample (Cap C=240):§!\nThresholds: 1, 50, 100 ships over\n\n§G40 Ships (Under):§! Base Bonus §G+10%§!\n§G200 Ships (Under):§! Base Bonus §G+10%§!\n§R280 Ships (40 Over):§! Exceeds Threshold 1. Penalty: §R-25%§!§!"
  LCoN_RULE_HYPERBOLIC: "Hyperbolic (Critical)"
  LCoN_RULE_HYPERBOLIC_DESC:0 "§LThis system uses a Hyperbolic 'Death Spiral.' Penalties are manageable until you approach a critical buffer, at which point logistics collapse entirely and efficiency drops toward zero.\n\n§HExample (Cap C=240, Buffer B=100):§!\nFormula Over Cap: 1 / (B - Over_Amount)\n\n§G40 Ships (Under):§! Linear Bonus §G+200%§!\n§G200 Ships (Under):§! Linear Bonus §G+40%§!\n§R280 Ships (40 Over):§! 1 / (100 - 40) = §R-1.7%§! (Note: At 95 Over, this spikes to -20%)§!"

  LCoN_RULE_CLAMP: "Logistics Safety Clamp"
  LCoN_RULE_CLAMP_ON: "Enabled (Recommended)"
  LCoN_RULE_CLAMP_ON_DESC: "Prevents naval production penalties from exceeding -100%. This ensures that even the most overextended fleet can still eventually produce or repair ships, albeit very slowly."
  LCoN_RULE_CLAMP_OFF: "Disabled"
  LCoN_RULE_CLAMP_OFF_DESC: "Removes the safety floor. Extreme over-extension can lead to penalties far exceeding -100%, effectively halting all naval industrial output until the fleet is reduced."

  LCoN_RULE_MOBILIZATION: "Economic Mobilization Impact"
  LCoN_RULE_MOB_ON: "Enabled"
  LCoN_RULE_MOB_ON_DESC: "Naval logistical efficiency is tied to your consumer goods usage. Civil economies will have reduced efficiency, while War Economies provide the full industrial support for the fleet."
  LCoN_RULE_MOB_OFF: "Disabled"
  LCoN_RULE_MOB_OFF_DESC: "Industry provides 100% logistical support regardless of your current economic law or consumer goods requirements."
