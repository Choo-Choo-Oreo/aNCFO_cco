 open_canopy: "Open Canopy"
 open_canopy_desc: "Open canopies offered exceptional visibility for pilots but left them vulnerable to enemy fire and the elements. Protection was minimal and drag are high due to bad aerodynamics."
 birdcage_canopy: "Birdcage Canopy"
 birdcage_canopy_desc: "Birdcage canopies provided better structural strength and ventilation compared to open canopies but still obstructed visibility and offered limited protection. They were a compromise between openness and protection."
 malcom_hood_canopy: "Malcom Hood Canopy"
 malcom_hood_canopy_desc: "Malcolm Hood canopies provided superior visibility with minimal obstruction but offered less structural protection compared to birdcage canopies."
 bubble_canopy: "Bubble Canopy"
 bubble_canopy_desc: "Bubble canopies offered unparalleled visibility and aerodynamics compared to Malcolm Hood canopies but were potentially more vulnerable to damage. "

 bba_aa_rocket: "Unguided AA Rocket"
 bba_aa_rocket_desc: "First air-to-air rockets, used during bomber interceptions in WWII, offered high maneuverability and simplicity for mass production. However, it faced challenges with range, accuracy, and vulnerability to enemy fighters."
 
 bba_fox1_rocket: "Radar-guided AA Missile"
 bba_fox1_rocket_desc: "These early radar-guided missiles marked a significant shift in air combat, moving from traditional gun-based dogfighting to beyond-visual-range (BVR) engagements. The technology developed during this period laid the groundwork for the sophisticated missile systems used by modern air forces around the world. "
  
 bba_fox2_rocket: "Infrared-guided AA Missile"
 bba_fox2_rocket_desc: "Infrared-guided air-to-air missile represented a significant advancement in aerial combat technology by allowing pilots to engage enemy aircraft beyond visual range with a heat-seeking missile. "
 
 fox1_rocket_tech: "Radar-guided AA Missiles"
 fox1_rocket_tech_desc: "The first radar-guided air-to-air rockets were developed during the early stages of the Cold War, with the AIM-4 Falcon being among the pioneering models."
 
 fox2_rocket_tech: "Infrared-guided AA Missile"
 fox2_rocket_tech_desc: "Infrared-guided air-to-air missile represented a significant advancement in aerial combat technology by allowing pilots to engage enemy aircraft beyond visual range with a heat-seeking missile. "

 ecm_systems_tech: "Arial ECM Systems"
 ecm_systems_tech_desc: "The first post-World War II electronic countermeasure (ECM) modules for aircraft were developed during the late 1940s and 1950s as military aviation transitioned into the jet age and the Cold War necessitated advanced electronic warfare capabilities." 
 ecm_pod: "ECM pod"
 ecm_pod_desc: "These pods were designed to emit electronic signals to disrupt or confuse enemy radar systems, thereby enhancing aircraft survivability."
 basic_radar_jammer: "Radar Jammer"
 basic_radar_jammer_desc: "These early systems were designed to jam enemy radar and communication systems, providing a significant tactical advantage."
 radar_warning_receiver: "Radar Warning Receiver"
 radar_warning_receiver_desc: "These systems detected radar emissions and alerted the crew to the presence of enemy radar."
 tail_warning_radar: "Tail Warning Radar"
 tail_warning_radar_desc: "During World War II, tail warning radar systems were developed to provide aircraft with early detection of enemy fighters approaching from the rear, significantly enhancing their defensive capabilities."
 rocket_pods_desc: "The early rocket pods represented a significant step forward in aerial warfare, providing aircraft with the ability to deliver powerful rocket barrages against a variety of targets."
 rocket_pods: "Rocket Pods"
 bba_rocket_pods_tech: "Rocket Pods"
 bba_rocket_pods_tech_desc: "The development of the first rocket pods for aircraft was a significant advancement in aerial weaponry, allowing planes to deliver concentrated rocket firepower against ground and naval targets. These early rocket pods were designed to be mounted on aircraft and to launch multiple rockets in quick succession. Here's a description of some of the pioneering rocket pods used during and shortly after World War II"
 
 torpedo_basic_sight: "Basic Aerial Torpedo Sight"
 torpedo_basic_sight_desc: "A basic aerial torpedo sight helps align aircraft for precise torpedo attacks, considering speed, altitude, distance, and target movement."
 torpedo_director_sight_1: "Course-Setting Bomb Sight"
 torpedo_director_sight_1_desc: "CSBS was originally designed for bomb aiming but was adapted for torpedo delivery." 
 torpedo_director_sight_2: "Torpedo Director Sight"
 torpedo_director_sight_2_desc: "A late-war torpedo director sight featured advanced optics and mechanical systems, enabling precise calculations of target speed, course, and aircraft trajectory, improving accuracy for low-altitude torpedo attacks against increasingly maneuverable naval targets." 
 
 armored_windscreen: "Armored Windscreen"
 armored_windscreen_desc: "Reinforced glass panel designed to protect pilots from enemy fire and debris during combat, enhancing their survivability in dogfights and strafing runs."
 
 armored_windscreen_medium: "Armored Windscreen"
 armored_windscreen_medium_desc: "Reinforced glass panel designed to shield pilots from enemy fire, shrapnel, and debris during dangerous bombing missions over heavily defended targets."

 armored_windscreen_large: "Armored Windscreen"
 armored_windscreen_large_desc: "These armored windscreen were critical for bomber crews, especially during missions over heavily defended areas, where the risk of being hit by flak or fighters was high."
 
 adv_hmg_defense_turret_2_barrels: "Remote Controlled 2 Gun Turret"
 adv_hmg_defense_turret_2_barrels_desc: "The remote-controlled 2-gun turret was an innovative defensive system. Operated from inside the aircraft, it used advanced sighting systems to aim and fire multiple .50 caliber machine guns, enhancing protection against enemy fighters."
 
 adv_hmg_defense_turret_2_barrels_2x: "Remote Controlled 2 Gun Turret 2x"
 adv_hmg_defense_turret_2_barrels_2x_desc: "A set of two remote-controlled 2-gun turrets was an innovative defensive system. Operated from inside the aircraft, it used advanced sighting systems to aim and fire multiple .50 caliber machine guns, enhancing protection against enemy fighters."

 adv_hmg_defense_turret_4_barrels: "Remote Controlled 4 Gun Turret"
 adv_hmg_defense_turret_4_barrels_desc: "The remote-controlled 4-gun turret was a defensive system operated by gunners using sighting stations. It used advanced computing to aim and fire multiple .50 caliber machine guns with precision, enhancing the bomber's protection against enemy fighters."
 
 adv_hmg_defense_turret_4_barrels_2x: "Remote Controlled 4 Gun Turret 2x"
 adv_hmg_defense_turret_4_barrels_2x_desc: "A set of two remote-controlled 4-gun turrets was a defensive system operated by gunners using sighting stations. It used advanced computing to aim and fire multiple .50 caliber machine guns with precision, enhancing the bomber's protection against enemy fighters."
 
 adv_hmg_defense_turret_4_2_barrels: "Remote Controlled 4+2 Gun Turret 2x"
 adv_hmg_defense_turret_4_2_barrels_desc: "A set of two remote-controlled 4-gun and 2-gun turrets operated from sighting stations. These turrets used analog computing to aim .50 caliber machine guns with precision, providing effective defense against enemy aircraft."
 
 adv_hmg_turrets: "Remote Controlled HMG Turrets" 
 adv_hmg_turrets_desc: "The Remote Control Turret System (RCT) or Central Station Fire Control System was first used in the Boeing B-29 Superfortress. Instead of the gunner being inside the turret, he was located inside the pressurized crew compartment. If the gunner was in a more comfortable heated environment, could wear fewer layers of clothes, wasn't restricted inside the turret it was reasoned that he would be less encumbered and less fatigued than his brother in the manned turret."

 imp_turret_servos_system: "Turret Servo Drive System"
 imp_turret_servos_system_desc: "WWII bomber turrets used hydraulic or electric power to enhance turret rotation and gun elevation. These systems provided smoother, faster, and more precise aiming, improving gunners' effectiveness against enemy aircraft."
 imp_turret_sights: "Improved Turret Gunsights"
 imp_turret_sights_desc: "These gunsights allowed gunners to engage enemy aircraft more effectively, even during dynamic combat scenarios."
 
 rear_lmg_post: "Rear LMG post"
 rear_lmg_post_desc: "Defensive station equipped with a light machine gun, operated by a gunner. Strategically placed at the rear of the aircraft, it protected against enemy attacks from behind" 
 rear_hmg_post: "Rear HMG post"
 rear_hmg_post_desc: "Equipped with powerful machine guns like the Browning M2 or UBT 12.7mm. Operated by a dedicated gunner, it provided critical protection against pursuing enemy fighters, offering long-range firepower and a wide defensive arc." 
 
 drop_tanks_75: "Small Drop Tank"
 drop_tanks_75_desc: "The 75-Gallon Metal Drop Tank (approximately 284 liters) was commonly used on WWII aircraft like the P-51 Mustang and P-47 Thunderbolt. Made of aluminum or steel, it provided extended range for long-range escort missions."

 drop_tanks_108: "Medium Drop Tank"
 drop_tanks_108_desc: "The 108-Gallon Metal Drop Tank (approximately 409 liters) was used to extend operational range for long-distance missions. It provided an additional 300 to 400 miles of range."

 drop_tanks_165: "Large Drop Tank"
 drop_tanks_165_desc: "The 165-Gallon Metal Drop Tank (approximately 625 liters) was used for a wery long-range missions. It offered significant fuel capacity, extending the aircraft’s range by 450 to 600 miles."

