 drop_tanks_165_x2_desc: "The 165-Gallon Metal Drop Tank (approximately 625 liters) was used for a wery long-range missions. It offered significant fuel capacity, extending the aircraft’s range by 450 to 600 miles."
 
 incendiary_bombs_strat: "Incendiary Bombs"
 incendiary_bombs_strat_desc: "Incendiary bombs are specialized munitions designed to start fires upon impact. They typically use materials like magnesium, thermite, or napalm to generate intense heat."

 incendiary_bombs_medium: "Incendiary Bombs"
 incendiary_bombs_medium_desc: "Incendiary bombs are specialized munitions designed to start fires upon impact. They typically use materials like magnesium, thermite, or napalm to generate intense heat" 
 
 jet_assisted_take_off: "Jet-Assisted Take-Off"
 jet_assisted_take_off_desc: "JATO is a type of assisted take-off for helping overloaded aircraft into the air by providing additional thrust in the form of small rockets."

 imp_jet_assisted_take_off: "Improved Jet-Assisted Take-Off"
 imp_jet_assisted_take_off_desc: "Improved, more compact JATO uses small rocket boosters, often resembling bottles, to provide additional thrust during aircraft takeoff." 
 
 fox_1_sp: "Radar-guided AA Missiles Project"
 fox_1_sp_desc: "Early radar-guided missile technology relied on onboard radar systems to track and engage targets. These missiles used semi-active or active radar homing, with the former requiring continuous radar illumination from the launch platform. Though limited in reliability and maneuverability compared to modern systems, they marked a breakthrough in beyond-visual-range combat, enabling effective engagement of enemy aircraft under challenging conditions."
 fox_1_custom_tt: ""
 
 fox_2_sp: "Infrared-guided AA Missile Project"
 fox_2_sp_desc: "Short-range infrared-guided missile technology utilizes heat-seeking sensors to track aircraft by their thermal emissions, especially engine exhaust. This advanced targeting allows for "fire-and-forget" operation, enabling pilots to engage multiple threats. Known for high agility and precision, these missiles revolutionized close-range aerial combat, offering a lethal edge in dogfights."

 radar_assisted_gunsight: "Radar Assisted Gunsight"
 radar_assisted_gunsight_desc: "Combining radar rangefinding with gyro gunsight to improving accuracy against ground and airborne targets." 
 radar_assisted_gunsight_sp: "Radar Assisted Gunsight Project"
 radar_assisted_gunsight_sp_desc: "The radar-assisted gunsight combined radar rangefinding with gyro gunsight to enhance gunnery accuracy. Developed during World War II, it provided real-time target distance and speed data, allowing for more precise lead compensation. This innovation significantly improved aerial combat effectiveness, especially in poor visibility or high-speed engagements."

