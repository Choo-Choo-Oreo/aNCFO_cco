 aircraft_engine_mounted_cannon_1: "Engine-Mounted Cannon I" 
 aircraft_engine_mounted_cannon_1_desc: "WWII engine-mounted cannons, often installed through the propeller hub or engine block, provided heavy firepower directly aligned with the pilot's sight. These cannons, like the German MK 108 or Soviet ShVAK, enhanced accuracy and destructive power, making them ideal for engaging enemy aircraft and ground targets." 
 
 aircraft_engine_mounted_cannon_2: "Engine-Mounted Cannon II"
 aircraft_engine_mounted_cannon_2_desc: "Late-WWII engine-mounted cannons featured increased firepower, improved reliability, and higher rates of fire. These advancements allowed fighters to effectively engage heavily armored aircraft and deliver devastating firepower, enhancing their role in air superiority and ground attack missions."  
 
