  OCfA_mob_breakdown_desc: "§H工业动员:§!\n - 当前消费品系数: [?OCfA_current_cg_total|%Y]\n - 工业效率: [?OCfA_econ_efficiency_factor|%G]\n\n§L高消费品系数会降低营容量。动员您的经济以充分利用工业产能。§!\n\n"
