  OCfA_opereation_capacity_dynamic_modifier: "已部署营容量"
  OCfA_battalion_label: "§H已部署营容量§!"
  OCfA_battalion_desc: "你的军队部署规模由国家的人口基数与工业产出支撑。超出该上限将对你的师造成严重的后勤压力。\n\n[OCfA_load_type_loc]: [OCfA_battalion_count_loc]/[?OCfA_calculated_battalion_capacity|Y0] \n\n§H人口贡献：§!\n - §Y核心州：§! [?OCfA_count_core|Y]\n   ([?OCfA_pop_k_core|Y1]k 人口 * [?OCfA_pop_core_weight_value|G2] 权重) / [?OCfA_pop_divisor_value|0] = §G[?OCfA_core_pop|1]§!\n - §Y非核心州：§! [?OCfA_count_non_core|Y]\n   ([?OCfA_pop_k_non_core|Y1]k 人口 * [?OCfA_pop_non_core_weight_value|G2] 权重) / [?OCfA_pop_divisor_value|0] = §G[?OCfA_non_core_pop|1]§!\n - §Y行政规模：§!\n   [?num_owned_states|Y] 已拥有地区 * [?OCfA_state_weight_value|G1] 权重 = §G[?OCfA_base_states|1]§!\n\n§H工业贡献：§!\n - 军用工厂： §Y[?num_of_military_factories|0]§! * §G[?OCfA_mil_weight_value|1]§!\n - 民用工厂： §Y[?num_of_civilian_factories|0]§! * §G[?OCfA_civ_weight_value|1]§!\n - 海军船坞： §Y[?num_of_naval_factories|0]§! * §G[?OCfA_doc_weight_value|1]§!\n - 工厂总权重： §Y[?OCfA_factory_points|1]§!\n - 工业化系数： §Yx§![?OCfA_industry_factor|Y2]\n\n§H全局倍率：§![OCfA_is_major_loc][OCfA_has_war_loc][OCfA_battalion_limit_factory_bonus_loc][OCfA_battalion_limit_pop_bonus_loc][OCfA_battalion_limit_pop_core_bonus_loc][OCfA_battalion_limit_pop_non_core_bonus_loc]\n - 固定容量修正： [?modifier@OCfA_battalion_limit_bonus|Y0]\n - 最低允许值： [?OCfA_min_capacity_value|Y0]\n - 最大允许值： [?OCfA_max_capacity_value|Y0]\n\n[OCfA_mobilization_loc][OCfA_upkeep_loc]§H当前修正：§!\n [?OCfA_ttf_ocd_value_inversion|Y%1] 训练时间系数\n [?OCfA_moz_ocd_value|=%+1] 动员效率系数\n [?OCfA_amf_ocd_value|=%+1] 陆军士气系数\n [?OCfA_pls_ocd_value|=%+1] 计划速度系数\n\n§G点单击此指示器可立即刷新您的营级容量上限。§!"

  OCfA_load_weighted: "§H陆军构成总览：§!\n - 步兵 (§Yx§![?OCfA_infantry_weight_value|Y1]): [?num_battalions_with_type@infantry|G0]（数值： [?OCfA_bat_inf|Y0]）\n - 轻型装甲 (§Yx§![?OCfA_light_armor_weight_value|Y1]): [?num_battalions_with_type@light_armor|G0]（数值： [?OCfA_bat_lar|Y0]）\n - 中型装甲 (§Yx§![?OCfA_medium_armor_weight_value|Y1]): [?num_battalions_with_type@medium_armor|G0]（数值： [?OCfA_bat_mar|Y0]）\n - 重型装甲 (§Yx§![?OCfA_heavy_armor_weight_value|Y1]): [?num_battalions_with_type@heavy_armor|G0]（数值： [?OCfA_bat_har|Y0]）\n - 摩托化 (§Yx§![?OCfA_motorized_weight_value|Y1]): [?num_battalions_with_type@motorized|G0]（数值： [?OCfA_bat_mot|Y0]）\n - 机械化 (§Yx§![?OCfA_mechanized_weight_value|Y1]): [?num_battalions_with_type@mechanized|G0]（数值： [?OCfA_bat_mec|Y0]）\n - 杂项 (§Yx1.0§!): [?OCfA_bat_misc|G0]\n\n总负载"
