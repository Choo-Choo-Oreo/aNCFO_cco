  OCfA_upkeep_desc: "§H军用工厂维护:§!\n - 损耗因数: [?OCfA_infra_strain|Y2]\n\n§L拥有过多军用工厂会导致后勤损耗。工业效率将除以此数值，以模拟由维护大规模军用经济所产生的成本。§!\n\n"
  OCfA_upkeep_none: ""

  OCfA_RULE_WEIGHTING: "营权重"
  OCfA_RULE_WEIGHT_OFF: "统一 (1 营队 = 1 容量)"
  OCfA_RULE_WEIGHT_OFF_DESC: "每个营无论大小均消耗 1 单位营容量。"
  OCfA_RULE_WEIGHT_ON: "加权 (基于类型)"
  OCfA_RULE_WEIGHT_ON_DESC: "重装营消耗更多容量。步兵营：1，炮兵营/摩托化营：2，装甲营：3+"

  OCfA_RULE_BUFF: "营队未达上限奖励"
  OCfA_RULE_BUFF_ON: "启用"
  OCfA_RULE_BUFF_ON_DESC: "部署超过上限的营将导致大幅的惩罚，受影响项包括：训练时间、动员速度、士气和计划速度"
  OCfA_RULE_BUFF_OFF: "禁用"
  OCfA_RULE_BUFF_OFF_DESC: "营容量系统将仅作为数量指示器，不会基于营队数量施加战斗或后勤惩罚。"

  OCfA_RULE_MOBILIZATION: "工业动员影响陆军"
  OCfA_RULE_MOB_ON: "启用"
  OCfA_RULE_MOB_ON_DESC: "已部署营容量与消费品系数挂钩。民用经济将降低效率，而战时经济则提供全额工业支持。"
  OCfA_RULE_MOB_OFF: "禁用"
  OCfA_RULE_MOB_OFF_DESC: "无论经济政策或消费品系数如何，工业均提供 100% 后勤支持。"

  OCfA_RULE_STRAIN: "军工复合体维护"
  OCfA_RULE_STRAIN_ON: "启用"
  OCfA_RULE_STRAIN_ON_DESC: "大规模军工设施会面临边际递减效应。您的后勤效率会随军用工厂数量的上升而下降。"
  OCfA_RULE_STRAIN_OFF: "禁用"
  OCfA_RULE_STRAIN_OFF_DESC: "高军用工厂数不会产生基准惩罚。"
