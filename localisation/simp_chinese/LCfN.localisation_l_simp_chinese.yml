l_simp_chinese:
  LCfN_naval_count: "[LCfN_naval_count_loc]/[?LCfN_calculated_naval_cap|Y0]"
  LCfN_naval_capacity_dynamic_modifier: "海军工业产能"
  LCfN_naval_label: "§H海军工业产能§!"
  LCfN_naval_desc: "您的海军由船坞和工厂的综合产出支撑。超过此上限会使您的海上后勤面临压力。\n\n[LCfN_load_type_loc]: [LCfN_naval_count_loc]/[?LCfN_calculated_naval_cap|Y0]\n\n§H工业构成明细:§!\n - 军用工厂 (§Yx§![?LCfN_mil_weight_value|Y1]): [?num_of_military_factories|G0] (数值: [?LCfN_mil_factories|Y0])\n - 民用工厂 (§Yx§![?LCfN_civ_weight_value|Y1]): [?num_of_civilian_factories|G0] (数值: [?LCfN_civ_factories|Y0])\n - 海军船坞 (§Yx§![?LCfN_doc_weight_value|Y1]): [?num_of_naval_factories|G0] (数值: [?LCfN_nav_dockyards|Y0])\n\n[LCfN_mobilization_loc][LCfN_upkeep_loc]§H当前修正:§!\n [?LCfN_icd_ncd_value|=%+1] 船坞产出\n\n[LCfN_formula_loc]\n\n§G点击此指示器可立即刷新您的后勤状态。§!"

  LCfN_load_weighted: "§H舰队细分:§!\n - $battle_cruiser$ (§Yx§![?LCfN_bc_weight_value|Y1]): [?num_ships_with_type@battle_cruiser|G0] (数值: [?LCfN_t_bc|Y0])\n - $battleship$ (§Yx§![?LCfN_bb_weight_value|Y1]): [?num_ships_with_type@battleship|G0] (数值: [?LCfN_t_bb|Y0])\n - $carrier$ (§Yx§![?LCfN_cv_weight_value|Y1]): [?num_ships_with_type@carrier|G0] (数值: [?LCfN_t_cv|Y0])\n - $destroyer$ (§Yx§![?LCfN_dd_weight_value|Y1]): [?num_ships_with_type@destroyer|G0] (数值: [?LCfN_t_cl|Y0])\n - $heavy_cruiser$ (§Yx§![?LCfN_ca_weight_value|Y1]): [?num_ships_with_type@heavy_cruiser|G0] (数值: [?LCfN_t_ca|Y0])\n - $light_cruiser$ (§Yx§![?LCfN_cl_weight_value|Y1]): [?num_ships_with_type@light_cruiser|G0] (数值: [?LCfN_t_cl|Y0])\n - $submarine$ (§Yx§![?LCfN_ss_weight_value|Y1]): [?num_ships_with_type@submarine|G0] (数值: [?LCfN_t_ss|Y0])\n - 杂项 (x§H1.0§!): [?LCfN_t_misc|G0]\n\n总负荷"
  LCfN_load_standard: "当前负荷"

  LCfN_count_red: "§R[?LCfN_current_ship_load|0]§!"
  LCfN_count_yellow: "§H[?LCfN_current_ship_load|0]§!"
  LCfN_count_green: "§G[?LCfN_current_ship_load|0]§!"

  LCfN_mob_breakdown_desc: "§H工业动员:§!\n - 当前消费品: [?LCfN_current_cg_total|%Y]\n - 后勤效率: [?LCfN_econ_efficiency_factor|%G]\n\n§L高消费品需求会降低海军后勤效率。动员您的经济以充分利用工业产能。§!\n\n"
  LCfN_mob_disabled_desc: ""

  LCfN_upkeep_desc: "§H基础设施维护:§!\n - 压力因子: [?LCfN_infra_strain|Y2]\n\n§L巨大规模的船坞会产生后勤摩擦。您的效率奖励将除以此因子，以模拟基础设施维护成本。§!\n\n"
  LCfN_upkeep_none: ""

  LCfN_linear_desc: "§L此系统使用线性曲线。效率以固定速率变化。每艘超过上限的船只都会增加相同的惩罚，提供稳定且可预测的体验。§!"
  LCfN_quadratic_desc: "§L此系统使用二次曲线。惩罚起初较小，但随着超过上限而迅速加速。惩罚没有上限。§!"
  LCfN_sigmoid_desc: "§L此系统使用S型曲线。对轻度超限较为温和，但在中间阶段急剧上升，最后达到基于船坞数量的工业天花板。§!"
  LCfN_logarithmic_desc: "§L此系统使用对数曲线。初期超限对效率影响巨大，但随着舰队继续扩大，惩罚增长会显著放缓。§!"
  LCfN_step_desc: "§L此系统使用固定阈值。效率在特定里程碑处突然大幅下降，而非平滑曲线。§!"
  LCfN_hyperbolic_desc: "§L此系统使用双曲线'死亡螺旋'。在接近临界缓冲区前惩罚尚可承受，一旦突破则后勤彻底崩溃。§!"

  LCfN_FORMULA_RULE: "海军后勤缩放"
  LCfN_RULE_LINEAR: "线性 (一致)"
  LCfN_RULE_LINEAR_DESC: "§L使用线性曲线。效率以固定速率变化，每艘超限船只的惩罚相同。\n\n§H示例 (上限 C=240, 除数 K=100):§!\n差值 (D) = C - S\n公式: D / K\n\n§G40 艘 (D=200):§! 200 / 100 = §G+200%§!\n§G200 艘 (D=40):§! 40 / 100 = §G+40%§!\n§R280 艘 (D=-40):§! -40 / 100 = §R-40%§!§!"
  LCfN_RULE_QUADRATIC: "二次 (加剧)"
  LCfN_RULE_QUADRATIC_DESC: "§L使用二次曲线。惩罚随超限程度迅速加速。\n\n§H示例 (上限 C=240, 除数 K=5000):§!\n公式: (D * D) / K\n\n§G40 艘 (D=200):§! (200^2) / 5000 = §G+800%§!\n§G200 艘 (D=40):§! (40^2) / 5000 = §G+32%§!\n§R280 艘 (D=-40):§! (-40^2) / 5000 = §R-32%§!§!"
  LCfN_RULE_SIGMOID: "S型 (均衡)"
  LCfN_RULE_SIGMOID_DESC: "§L使用S型曲线。特点是软启动、中期急剧缩放以及基于船坞数的工业上限。\n\n§H示例 (上限 C=240, 除数 K=5000):§!\n公式: (D * D) / K\n上限: 船坞 (20) * 0.2 = §Y+/-400% 上限§!\n\n§G40 艘 (D=200):§! (200^2) / 5000 = §G+400%§! (已达上限)\n§G200 艘 (D=40):§! (40^2) / 5000 = §G+32%§!\n§R280 艘 (D=-40):§! (-40^2) / 5000 = §R-32%§!§!"
  LCfN_RULE_LOGARITHMIC: "对数 (早期冲击)"
  LCfN_RULE_LOGARITHMIC_DESC: "§L使用对数曲线。初期超限影响较大，但后期惩罚增长变慢。\n\n§H示例 (上限 C=240, 最大 M=5.0):§!\n公式: (M * D) / (D + 100)\n\n§G40 艘 (D=200):§! (5 * 200) / 300 = §G+333%§!\n§G200 艘 (D=40):§! (5 * 40) / 140 = §G+142%§!\n§R280 艘 (D=-40):§! (5 * -40) / 140 = §R-142%§!§!"
  LCfN_RULE_STEP: "阶梯函数 (里程碑)"
  LCfN_RULE_STEP_DESC: "§L使用固定阈值。效率在特定里程碑处呈阶梯式下降。\n\n§H示例 (上限 C=240):§!\n阈值: 超过 1, 50, 100 艘\n\n§G40 艘 (未超):§! 基础奖励 §G+10%§!\n§G200 艘 (未超):§! 基础奖励 §G+10%§!\n§R280 艘 (超40):§! 突破阈值 1。惩罚: §R-25%§!§!"
  LCfN_RULE_HYPERBOLIC: "双曲线 (极度危险)"
  LCfN_RULE_HYPERBOLIC_DESC: "§L使用'死亡螺旋'。接近临界缓冲区时，后勤会彻底崩溃，效率骤降至零。\n\n§H示例 (上限 C=240, 缓冲区 B=100):§!\n超限公式: 1 / (B - Over_Amount)\n\n§G40 艘 (未超):§! 线性奖励 §G+200%§!\n§G200 艘 (未超):§! 线性奖励 §G+40%§!\n§R280 艘 (超40):§! 1 / (100 - 40) = §R-1.7%§! (注意: 超限 95 时会飙升至 -20%)§!"

  LCfN_RULE_CLAMP: "后勤安全钳制"
  LCfN_RULE_CLAMP_ON: "启用 (推荐)"
  LCfN_RULE_CLAMP_ON_DESC: "防止海军生产惩罚超过 -100%。这确保了即使是极度超标的舰队仍能缓慢建造或维修舰船。"
  LCfN_RULE_CLAMP_OFF: "禁用"
  LCfN_RULE_CLAMP_OFF_DESC: "移除安全底线。极端超限可能导致惩罚远超 -100%，实质上停滞所有海军工业产出。"
  LCfN_RULE_UNCLAMPED_PENALTY: "硬核模式: 专注于超限惩罚"
  LCfN_RULE_UNCLAMPED_PENALTY_DESC: "移除所有未达上限时的奖励。超限惩罚无上限。为防止彻底崩溃，超限国家将获得基于船坞总数的微量输送船补给。"

  LCfN_RULE_MOBILIZATION: "经济动员影响"
  LCfN_RULE_MOB_ON: "启用"
  LCfN_RULE_MOB_ON_DESC: "海军后勤效率与消费品使用挂钩。民用经济效率较低，而战争经济提供全额工业支持。"
  LCfN_RULE_MOB_OFF: "禁用"
  LCfN_RULE_MOB_OFF_DESC: "无论经济法或消费品需求如何，工业均提供 100% 后勤支持。"

  LCfN_RULE_WEIGHTING: "舰船权重"
  LCfN_RULE_WEIGHT_OFF: "统一 (1 舰 = 1 容量)"
  LCfN_RULE_WEIGHT_OFF_DESC: "每艘船无论大小均消耗 1 单位海军容量。"
  LCfN_RULE_WEIGHT_ON: "加权 (基于船体)"
  LCfN_RULE_WEIGHT_ON_DESC: "大型舰船消耗更多容量。驱逐/潜艇: 1，巡洋舰: 2，主力舰: 4+。"

  LCfN_RULE_SCALING_LOGIC: "缩放计算逻辑"
  LCfN_RULE_DISTANCE: "绝对数值"
  LCfN_RULE_DISTANCE_DESC: "后勤基于超过或低于上限的舰船原始数量。"
  LCfN_RULE_PERCENT: "饱和百分比"
  LCfN_RULE_PERCENT_DESC: "后勤基于已使用的容量百分比。更适合小国。"

  LCfN_RULE_STRAIN: "基础设施维护"
  LCfN_RULE_STRAIN_ON: "启用"
  LCfN_RULE_STRAIN_ON_DESC: "大量船坞会因维护复杂性而面临边际收益递减。"
  LCfN_RULE_STRAIN_OFF: "禁用"
  LCfN_RULE_STRAIN_OFF_DESC: "船坞不会产生基础后勤压力。"
