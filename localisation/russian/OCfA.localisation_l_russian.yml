  OCfA_battalion_limit_factory_bonus_desc: "\n - Бонус к лимиту от заводов: [?modifier@OCfA_battalion_limit_factory_bonus]"
  OCfA_battalion_limit_factory_bonus_none: ""

  OCfA_battalion_limit_pop_bonus_desc: "\n - Бонус к лимиту от населения: [?modifier@OCfA_battalion_limit_pop_bonus]"
  OCfA_battalion_limit_pop_bonus_none: ""

  OCfA_battalion_limit_pop_core_bonus_desc: "\n - Бонус к лимиту от нац. населения: [?modifier@OCfA_battalion_limit_pop_core_bonus]"
  OCfA_battalion_limit_pop_core_bonus_none: ""

  OCfA_battalion_limit_pop_non_core_bonus_desc: "\n - Бонус к лимиту от ненац. населения: [?modifier@OCfA_battalion_limit_pop_non_core_bonus]"
  OCfA_battalion_limit_pop_non_core_bonus_none: ""

