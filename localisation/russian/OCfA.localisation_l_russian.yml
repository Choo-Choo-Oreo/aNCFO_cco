l_russian:
  OCfA_battalion_count: "[OCfA_battalion_count_loc]/[?OCfA_calculated_battalion_capacity|Y0]"
  OCfA_opereation_capacity_dynamic_modifier: "Оперативный лимит батальонов"
  OCfA_battalion_label: "§HОперативный лимит батальонов§!"
  OCfA_battalion_desc: "Оперативный масштаб вашей армии поддерживается населением страны и промышленным производством. Превышение этого лимита создает значительную логистическую нагрузку на ваши дивизии.\n\n[OCfA_load_type_loc]: [OCfA_battalion_count_loc]/[?OCfA_calculated_battalion_capacity|Y0] \n\n§HВклад населения:§!\n - §YНациональные регионы:§! [?OCfA_count_core|Y]\n   ([?OCfA_pop_k_core|Y1]k Нас. * Вес [?OCfA_pop_core_weight_value|G2]) / [?OCfA_pop_divisor_value|0] = §G[?OCfA_core_pop|1]§!\n - §YНенациональные регионы:§! [?OCfA_count_non_core|Y]\n   ([?OCfA_pop_k_non_core|Y1]k Нас. * Вес [?OCfA_pop_non_core_weight_value|G2]) / [?OCfA_pop_divisor_value|0] = §G[?OCfA_non_core_pop|1]§!\n - §YАдминистративный размер:§!\n   Регионов во владении: [?num_owned_states|Y] * Вес [?OCfA_state_weight_value|G1] = §G[?OCfA_base_states|1]§!\n\n§HПромышленный вклад:§!\n - Военные заводы: §Y[?num_of_military_factories|0]§! * §G[?OCfA_mil_weight_value|1]§!\n - Гражданские фабрики: §Y[?num_of_civilian_factories|0]§! * §G[?OCfA_civ_weight_value|1]§!\n - Верфи: §Y[?num_of_naval_factories|0]§! * §G[?OCfA_doc_weight_value|1]§!\n - Общий вес заводов: §Y[?OCfA_factory_points|1]§!\n - Коэффициент индустриализации: §Yx§![?OCfA_industry_factor|Y2]\n\n§HГлобальные множители:§![OCfA_is_major_loc][OCfA_has_war_loc][OCfA_battalion_limit_factory_bonus_loc][OCfA_battalion_limit_pop_bonus_loc][OCfA_battalion_limit_pop_core_bonus_loc][OCfA_battalion_limit_pop_non_core_bonus_loc]\n - Базовый модификатор лимита: [?modifier@OCfA_battalion_limit_bonus|Y0]\n - Минимум: [?OCfA_min_capacity_value|Y0]\n - Максимум: [?OCfA_max_capacity_value|Y0]\n\n[OCfA_mobilization_loc][OCfA_upkeep_loc]§HТекущие модификаторы:§!\n [?OCfA_ttf_ocd_value_inversion|Y%1] Время обучения\n [?OCfA_moz_ocd_value|=%+1] Скорость мобилизации\n [?OCfA_amf_ocd_value|=%+1] Боевой дух армии\n [?OCfA_pls_ocd_value|=%+1] Скорость планирования\n\n§GНажмите на индикатор, чтобы немедленно обновить лимит батальонов.§!"

  OCfA_load_weighted: "§HСостав армии:§!\n - Пехота (§Yx§![?OCfA_infantry_weight_value|Y1]): [?num_battalions_with_type@infantry|G0] (Значение: [?OCfA_bat_inf|Y0])\n - Легкая бронетехника (§Yx§![?OCfA_light_armor_weight_value|Y1]): [?num_battalions_with_type@light_armor|G0] (Значение: [?OCfA_bat_lar|Y0])\n - Средняя бронетехника (§Yx§![?OCfA_medium_armor_weight_value|Y1]): [?num_battalions_with_type@medium_armor|G0] (Значение: [?OCfA_bat_mar|Y0])\n - Тяжелая бронетехника (§Yx§![?OCfA_heavy_armor_weight_value|Y1]): [?num_battalions_with_type@heavy_armor|G0] (Значение: [?OCfA_bat_har|Y0])\n - Моторизованные (§Yx§![?OCfA_motorized_weight_value|Y1]): [?num_battalions_with_type@motorized|G0] (Значение: [?OCfA_bat_mot|Y0])\n - Механизированные (§Yx§![?OCfA_mechanized_weight_value|Y1]): [?num_battalions_with_type@mechanized|G0] (Значение: [?OCfA_bat_mec|Y0])\n - Прочее (§Yx1.0§!): [?OCfA_bat_misc|G0]\n\nОбщая нагрузка"
  OCfA_load_standard: "Текущая нагрузка"

  OCfA_count_red: "§R[?OCfA_current_battalion_load|0]§!"
  OCfA_count_yellow: "§H[?OCfA_current_battalion_load|0]§!"
  OCfA_count_green: "§G[?OCfA_current_battalion_load|0]§!"

