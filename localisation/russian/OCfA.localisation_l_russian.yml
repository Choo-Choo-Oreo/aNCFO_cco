  OCfA_battalion_limit_bonus_none: ""

  OCfA_mob_breakdown_desc: "§HПромышленная мобилизация:§!\n - Текущие товары народного потребления: [?OCfA_current_cg_total|%Y]\n - Промышленная эффективность: [?OCfA_econ_efficiency_factor|%G]\n\n§LВысокий спрос на товары народного потребления снижает эффективность вашего лимита батальонов. Мобилизуйте свою экономику, чтобы использовать полный лимит батальонов на передовой.§!\n\n"
  OCfA_mob_disabled_desc: ""

  OCfA_upkeep_desc: "§HСодержание военно-промышленного комплекса:§!\n - Фактор нагрузки: [?OCfA_infra_strain|Y2]\n\n§LМасштаб вашего военно-промышленного комплекса создает административные трения. Ваша эффективность делится на этот фактор, чтобы имитировать стоимость содержания обширной военной экономики.§!\n\n"
  OCfA_upkeep_none: ""

  OCfA_RULE_WEIGHTING: "Вес батальонов"
  OCfA_RULE_WEIGHT_OFF: "Единообразный (1 батальон = 1 лимит)"
  OCfA_RULE_WEIGHT_OFF_DESC: "Каждый батальон, независимо от его типа или стоимости снаряжения, потребляет ровно 1 единицу оперативного лимита."
  OCfA_RULE_WEIGHT_ON: "Взвешенный (по типу)"
  OCfA_RULE_WEIGHT_ON_DESC: "Более тяжелые батальоны потребляют больше лимита. Пехота: 1, Артиллерия/Моторизованные: 2, Бронетехника: 3+."

  OCfA_RULE_BUFF: "Бонус за неполную загрузку"
  OCfA_RULE_BUFF_ON: "Включено"
  OCfA_RULE_BUFF_ON_DESC: "Превышение лимита батальонов наложит значительные штрафы на время обучения, скорость мобилизации, боевой дух армии и скорость планирования."
  OCfA_RULE_BUFF_OFF: "Выключено"
  OCfA_RULE_BUFF_OFF_DESC: "Система лимита батальонов будет чисто информативной. Никаких боевых или логистических штрафов не будет, независимо от размера армии."

  OCfA_RULE_MOBILIZATION: "Пром. мобилизация влияет на армию"
  OCfA_RULE_MOB_ON: "Включено"
  OCfA_RULE_MOB_ON_DESC: "Оперативный лимит батальонов привязан к потреблению товаров народного потребления. Гражданская экономика будет иметь сниженный лимит, в то время как полностью мобилизованная военная экономика обеспечит максимальную поддержку вашим дивизиям."
  OCfA_RULE_MOB_OFF: "Выключено"
  OCfA_RULE_MOB_OFF_DESC: "Промышленность обеспечивает 100% логистическую поддержку вашего лимита батальонов независимо от текущего экономического закона или требований к товарам народного потребления."

  OCfA_RULE_STRAIN: "Содержание военно-промышленного комплекса"
  OCfA_RULE_STRAIN_ON: "Включено"
  OCfA_RULE_STRAIN_ON_DESC: "Огромный масштаб военно-промышленного комплекса влечет за собой снижение отдачи. Ваша логистическая эффективность снижается по мере роста общего количества военных заводов."
  OCfA_RULE_STRAIN_OFF: "Выключено"
  OCfA_RULE_STRAIN_OFF_DESC: "Большое количество военных заводов не создает базовой административной нагрузки."
