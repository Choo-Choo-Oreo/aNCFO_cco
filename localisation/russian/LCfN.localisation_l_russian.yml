l_russian:
  LCfN_naval_count: "[LCfN_naval_count_loc]/[?LCfN_calculated_naval_cap|Y0]"
  LCfN_naval_capacity_dynamic_modifier: "Военно-морской промышленный потенциал"
  LCfN_naval_label: "§HВоенно-морской промышленный потенциал§!"
  LCfN_naval_desc: "Ваш военно-морской флот поддерживается за счет совокупной мощности ваших верфей и заводов. Превышение этого лимита создает нагрузку на вашу морскую логистику.\n\n[LCfN_load_type_loc]: [LCfN_naval_count_loc]/[?LCfN_calculated_naval_cap|Y0]\n\n§HРаспределение по отраслям:§!\n - Военные заводы (§Yx§![?LCfN_mil_weight_value|Y1]): [?num_of_military_factories|G0] (Значение: [?LCfN_mil_factories|Y0])\n - Гражданские фабрики (§Yx§![?LCfN_civ_weight_value|Y1]): [?num_of_civilian_factories|G0] (Значение: [?LCfN_civ_factories|Y0])\n - Морские верфи (§Yx§![?LCfN_doc_weight_value|Y1]): [?num_of_naval_factories|G0] (Значение: [?LCfN_nav_dockyards|Y0])\n\n[LCfN_mobilization_loc][LCfN_upkeep_loc]§HТекущий модификатор:§!\n [?LCfN_icd_ncd_value|=%+1] Производительность верфей\n\n[LCfN_formula_loc]\n\n§GНажмите на этот индикатор, чтобы немедленно обновить данные о военно-морском потенциале.§!"

  LCfN_load_weighted: "§HСостав флота:§!\n - $battle_cruiser$ (§Yx§![?LCfN_bc_weight_value|Y1]): [?num_ships_with_type@battle_cruiser|G0] (Значение: [?LCfN_t_bc|Y0])\n - $battleship$ (§Yx§![?LCfN_bb_weight_value|Y1]): [?num_ships_with_type@battleship|G0] (Значение: [?LCfN_t_bb|Y0])\n - $carrier$ (§Yx§![?LCfN_cv_weight_value|Y1]): [?num_ships_with_type@carrier|G0] (Значение: [?LCfN_t_cv|Y0])\n - $destroyer$ (§Yx§![?LCfN_dd_weight_value|Y1]): [?num_ships_with_type@destroyer|G0] (Значение: [?LCfN_t_dd|Y0])\n - $heavy_cruiser$ (§Yx§![?LCfN_ca_weight_value|Y1]): [?num_ships_with_type@heavy_cruiser|G0] (Значение: [?LCfN_t_ca|Y0])\n - $light_cruiser$ (§Yx§![?LCfN_cl_weight_value|Y1]): [?num_ships_with_type@light_cruiser|G0] (Значение: [?LCfN_t_cl|Y0])\n - $submarine$ (§Yx§![?LCfN_ss_weight_value|Y1]): [?num_ships_with_type@submarine|G0] (Значение: [?LCfN_t_ss|Y0])\n - Прочее (x§H1.0§!): [?LCfN_t_misc|G0]\n\nОбщая нагрузка"
  LCfN_load_standard: "Текущая нагрузка"

  LCfN_count_red: "§R[?LCfN_current_ship_load|0]§!"
  LCfN_count_yellow: "§H[?LCfN_current_ship_load|0]§!"
  LCfN_count_green: "§G[?LCfN_current_ship_load|0]§!"

  LCfN_mob_breakdown_desc: "§HПромышленная мобилизация:§!\n - Текущие товары народного потребления: [?LCfN_current_cg_total|%Y]\n - Промышленная эффективность: [?LCfN_econ_efficiency_factor|%G]\n\n§LВысокий спрос на потребительские товары снижает эффективность вашей морской логистики. Мобилизуйте свою экономику, чтобы полностью использовать промышленный потенциал.§!\n\n"
  LCfN_mob_disabled_desc: ""

  LCfN_upkeep_desc: "§HОбслуживание инфраструктуры:§!\n - Фактор нагрузки: [?LCfN_infra_strain|Y2]\n\n§LОгромный масштаб ваших верфей создает логистические трудности. Ваша эффективность делится на этот коэффициент, чтобы моделировать затраты на поддержание обширной военной экономики.§!\n\n"
  LCfN_upkeep_none: ""

  LCfN_linear_desc: "§LЭта система использует линейную кривую. Эффективность меняется с фиксированной, постоянной скоростью. Каждый корабль, превышающий вашу вместимость, добавляет одинаковый штраф, обеспечивая предсказуемость и стабильность игры.§!"
  LCfN_quadratic_desc: "§LВ этой системе используется квадратичная кривая. Штрафы начинаются с небольших сумм, но быстро растут по мере превышения установленного лимита. Максимальный размер штрафа не ограничен.§!"
  LCfN_sigmoid_desc: "§LВ этой системе используется сигмовидная (S-образная кривая). Он имеет «мягкий» старт при незначительном чрезмерном расширении, но резко масштабируется в середине, прежде чем достичь жесткого промышленного потолка, в зависимости от количества верфей.§!"
  LCfN_logarithmic_desc: "§LВ этой системе используется логарифмическая кривая. Первые корабли, превышающие установленный предел, оказывают значительное влияние на эффективность, однако рост штрафа значительно замедляется по мере роста вашего флота§!"
  LCfN_step_desc: "§LВ этой системе используются фиксированные пороговые значения. Вместо плавной кривой эффективность падает резкими, значительными «скачками» при достижении определённых пороговых значений (например, при превышении лимита на 1, 50 и 100 кораблей).§!"
  LCfN_hyperbolic_desc: "§LЭта система использует гиперболическую «спираль смерти». Штрафы можно контролировать до тех пор, пока вы не достигнете критического буфера, после чего логистика полностью рухнет, а эффективность упадет до нуля.§!"

  LCfN_FORMULA_RULE: "Масштабирование бонусов флота"
  LCfN_RULE_LINEAR: "Линейное (Последовательное)"
  LCfN_RULE_LINEAR_DESC: "§LЭта система использует линейную кривую. Эффективность меняется с фиксированной, постоянной скоростью. Каждый корабль, превышающий вашу вместимость, добавляет одинаковый штраф, обеспечивая предсказуемость и стабильность игры.\n\n§HПример (Лимит C=240, Делитель K=100):§!\nРазница (D) = C - S\nФормула: D / K\n\n§G40 Кораблей (D=200):§! 200 / 100 = §G+200%§!\n§G200 Кораблей (D=40):§! 40 / 100 = §G+40%§!\n§R280 Кораблей (D=-40):§! -40 / 100 = §R-40%§!§!"
  LCfN_RULE_QUADRATIC: "Квадратичное (Масштабируемое)"
  LCfN_RULE_QUADRATIC_DESC: "§LВ этой системе используется квадратичная кривая. Штрафы начинаются с небольших сумм, но быстро растут по мере превышения установленного лимита. Максимальный размер штрафа не ограничен.\n\n§HПример (Лимит C=240, Делитель K=5000):§!\nФормула: (D * D) / K\n\n§G40 Кораблей (D=200):§! (200^2) / 5000 = §G+800%§!\n§G200 Кораблей (D=40):§! (40^2) / 5000 = §G+32%§!\n§R280 Кораблей (D=-40):§! (-40^2) / 5000 = §R-32%§!§!"
  LCfN_RULE_SIGMOID: "Сигмоида (Сбалансированное)"
  LCfN_RULE_SIGMOID_DESC: "§LВ этой системе используется сигмовидная (S-образная кривая). Он имеет «мягкий» старт при незначительном чрезмерном расширении, но резко масштабируется в середине, прежде чем достичь жесткого промышленного потолка, в зависимости от количества верфей.\n\n§HПример (Лимит C=240, Делитель K=5000):§!\nФормула: (D * D) / K\nЛимит: Верфи (20) * 0.2 = §Y+/-400% Лимит§!\n\n§G40 Кораблей (D=200):§! (200^2) / 5000 = §G+400%§! (Достигнут лимит)\n§G200 Кораблей (D=40):§! (40^2) / 5000 = §G+32%§!\n§R280 Кораблей (D=-40):§! (-40^2) / 5000 = §R-32%§!§!"
  LCfN_RULE_LOGARITHMIC: "Логарифмическое (Ранний эффект)"
  LCfN_RULE_LOGARITHMIC_DESC: "§LИспользует логарифмическую кривую. Первые корабли сверх лимита имеют высокий штраф, но его рост замедляется.\n\n§HПример (Лимит C=240, Макс M=5.0):§!\nФормула: (M * D) / (D + 100)\n\n§G40 Кораблей (D=200):§! (5 * 200) / 300 = §G+333%§!\n§G200 Кораблей (D=40):§! (5 * 40) / 140 = §G+142%§!\n§R280 Кораблей (D=-40):§! (5 * -40) / 140 = §R-142%§!§!"
  LCfN_RULE_STEP: "Ступенчатое (Вехи)"
  LCfN_RULE_STEP_DESC: "§LВ этой системе используются фиксированные пороговые значения. Вместо плавной кривой эффективность падает резкими, значительными «скачками» при достижении определённых пороговых значений (например, при превышении лимита на 1, 50 и 100 кораблей).\n\n§HПример (Лимит C=240):§!\nПороги: 1, 50, 100 кораблей сверх лимита\n\n§G40 Кораблей (Ниже):§! Базовый бонус §G+10%§!\n§G200 Кораблей (Ниже):§! Базовый бонус §G+10%§!\n§R280 Кораблей (40 Сверх):§! Порог 1. Штраф: §R-25%§!§!"
  LCfN_RULE_HYPERBOLIC: "Гиперболическое (Критическое)"
  LCfN_RULE_HYPERBOLIC_DESC: "§LЭта система использует гиперболическую «спираль смерти». Штрафы можно контролировать до тех пор, пока вы не достигнете критического буфера, после чего логистика полностью рухнет, а эффективность упадет до нуля.\n\n§HПример (Лимит C=240, Буфер B=100):§!\nФормула сверх лимита: 1 / (B - Over_Amount)\n\n§G40 Кораблей (Ниже):§! Линейный бонус §G+200%§!\n§G200 Кораблей (Ниже):§! Линейный бонус §G+40%§!\n§R280 Кораблей (40 Сверх):§! 1 / (100 - 40) = §R-1.7%§! (При 95 Сверх штраф взлетит до -20%)§!"

  LCfN_RULE_CLAMP: "Ограничитель безопасности логистики"
  LCfN_RULE_CLAMP_ON: "Включен (Рекомендуется)"
  LCfN_RULE_CLAMP_ON_DESC: "Предотвращает падение штрафов ниже -100%. Это гарантирует, что даже перегруженный флот сможет строить или чинить корабли, хоть и очень медленно."
  LCfN_RULE_CLAMP_OFF: "Выключен"
  LCfN_RULE_CLAMP_OFF_DESC: "Снимает ограничение. Экстремальное перепроизводство флота может остановить работу верфей полностью."
  LCfN_RULE_UNCLAMPED_PENALTY: "Хардкор: Фокус на перегрузке"
  LCfN_RULE_UNCLAMPED_PENALTY_DESC: "Убирает все бонусы за недобор лимита. Штрафы за превышение не ограничены. Для предотвращения полного краха страны получают минимальный приток конвоев."

  LCfN_RULE_MOBILIZATION: "Влияние экономической мобилизации"
  LCfN_RULE_MOB_ON: "Включено"
  LCfN_RULE_MOB_ON_DESC: "Эффективность военно-морской логистики зависит от использования вами потребительских товаров. Гражданская экономика будет иметь пониженную эффективность, в то время как военная экономика обеспечит полную промышленную поддержку флота."
  LCfN_RULE_MOB_OFF: "Выключено"
  LCfN_RULE_MOB_OFF_DESC: "Промышленность обеспечивает 100% логистическую поддержку независимо от вашего текущего экономического законодательства или требований к потребительским товарам."

  LCfN_RULE_WEIGHTING: "Вес кораблей"
  LCfN_RULE_WEIGHT_OFF: "Единообразно (1 Корабль = 1 Вес)"
  LCfN_RULE_WEIGHT_OFF_DESC: "Каждый корабль, независимо от размера, занимает 1 единицу лимита."
  LCfN_RULE_WEIGHT_ON: "Взвешенно (По корпусу)"
  LCfN_RULE_WEIGHT_ON_DESC: "Большие корабли потребляют больше лимита. Эсминцы/Субмарины: 1, Крейсеры: 2, Кэпиталз: 4+."

  LCfN_RULE_SCALING_LOGIC: "Расчет военно-морского бонуса"
  LCfN_RULE_DISTANCE: "Абсолютное значение"
  LCfN_RULE_DISTANCE_DESC: "Логистика зависит от того, превышает ли количество кораблей установленный лимит или не дотягивает до него."
  LCfN_RULE_PERCENT: "Процент насыщения"
  LCfN_RULE_PERCENT_DESC: "Логистика основана на проценте использования мощностей. Лучше для небольших стран."

  LCfN_RULE_STRAIN: "Обслуживание верфи"
  LCfN_RULE_STRAIN_ON: "Включено"
  LCfN_RULE_STRAIN_ON_DESC: "Многие верфи сталкиваются с проблемой снижения производительности. Ваш бонус к логистике распределяется пропорционально общему количеству верфей."
  LCfN_RULE_STRAIN_OFF: "Выключено"
  LCfN_RULE_STRAIN_OFF_DESC: "Верфи не создают базовой нагрузки на логистику."
